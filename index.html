<style>
:root {
  /* ── Family identity colors ── */
  --cluster-greco:     #1A3A5C;
  --cluster-cerullo:   #6B1F7A;
  --cluster-carracci:  #B5411C;
  --cluster-peluso:    #1E5C30;
  --cluster-sarratore: #7A5A0A;
  --cluster-cappuccio: #0F5470;
  --cluster-solara:    #9E1F23;
  --cluster-scanno:    #2A5C40;
  --cluster-spagnuolo: #5A2A5A;
  --cluster-other:     #3E3830;

  /* ── Swiss Editorial palette ── */
  --surface-bg:    #EBEBEB;   /* cool editorial off-white */
  --surface-panel: #D6D6D4;   /* cool mid-gray */
  --surface-card:  #F2F2F0;   /* near-white card surface */
  --surface-hover: #E0E0DE;
  --text-primary:  #1A1A1A;   /* near-black */
  --text-secondary:#5A5A5A;   /* medium gray */
  --text-muted:    rgba(26,26,26,0.45);
  --border-subtle: rgba(26,26,26,0.18);
  --border-default:#1A1A1A;   /* near-black */
  --accent:        #C8391A;   /* burnt orange-red — active states only */

  /* ── Dual-type system ── */
  --font-sans:  "Helvetica Neue", "Inter", sans-serif;   /* UI labels, names */
  --font-mono:  "Space Mono", "Roboto Mono", monospace;  /* data, numbers, dates */
  --font-serif: "Playfair Display", "Georgia", serif;    /* narrative, bios, descriptions */

  --ease-out:        cubic-bezier(0.23, 1, 0.32, 1);   /* strong ease-out for entries */
  --ease-in-out:     cubic-bezier(0.77, 0, 0.175, 1);  /* strong ease-in-out for flips */
  --dur-fast: 160ms;
}

*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-sans);
  background: var(--surface-bg);
  color: var(--text-primary);
  height: 100dvh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
#header {
  flex-shrink: 0;
  background: var(--surface-panel);
  border-bottom: 1px solid var(--border-default);
  z-index: 20;
}
#header-top { padding: 14px 24px; }
#header h1 {
  font-family: var(--font-mono);
  font-size: 13px; font-weight: 700;
  letter-spacing: 0.10em; text-transform: uppercase;
  color: var(--text-secondary);
}
#header h1 span { color: var(--text-primary); }

/* ── Main scroll container ── */
#main { flex: 1; overflow-y: auto; }

/* ── Chapter strip ── */
#chapter-strip {
  padding: 20px 24px 18px;
  border-bottom: 1px solid var(--border-default);
  background: var(--surface-panel);
  position: sticky; top: 0; z-index: 10;
}
#chapter-strip-label {
  display: flex; align-items: flex-end; gap: 12px;
  margin-bottom: 20px; flex-wrap: wrap;
}
#chapter-label-text {
  font-family: var(--font-mono);
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--text-muted);
  padding-bottom: 10px;
}
/* Chapter number — Swiss poster scale */
#chapter-val {
  font-family: var(--font-sans);
  font-size: 56px; font-weight: 700;
  letter-spacing: -0.03em;
  text-transform: uppercase;
  color: var(--accent);
  line-height: 0.9; min-width: 2ch;
}
#chapter-val-suffix {
  font-family: var(--font-mono);
  font-size: 11px; letter-spacing: 0.10em;
  text-transform: uppercase;
  color: var(--text-muted);
  padding-bottom: 10px;
}
/* Era name — sans, editorial */
#chapter-era {
  font-family: var(--font-sans);
  font-size: 15px; font-weight: 400;
  font-style: italic;
  color: var(--text-secondary);
  letter-spacing: -0.01em;
  padding-bottom: 8px;
}

/* ── Slider arrow hints overlaid on the thumb ── */
#slider-wrap {
  position: relative;
  height: 24px;
  display: flex; align-items: center;
}
/* Arrow overlay sits exactly on top of the orange thumb */
#thumb-arrow {
  position: absolute;
  top: 50%;
  left: calc(var(--pct, 0) / 100 * (100% - 24px) + 12px);
  transform: translate(-50%, -50%);
  width: 24px; height: 24px;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
  font-size: 13px; font-weight: 700; line-height: 1;
  color: #fff;
  z-index: 2;
  letter-spacing: -0.04em;
}
@keyframes arrowBlink {
  0%, 100% { opacity: 0.3; }
  50%       { opacity: 1; }
}
#thumb-arrow.pulse { animation: arrowBlink 2s ease-in-out infinite; }

/* ── Chapter scroller: 3px track filled with accent up to thumb position ── */
#chapter-slider {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 3px;
  background: linear-gradient(
    to right,
    var(--accent) 0%,
    var(--accent) calc(var(--pct, 0) * 1%),
    var(--border-default) calc(var(--pct, 0) * 1%),
    var(--border-default) 100%
  );
  outline: none; cursor: pointer;
  border-radius: 0;
}
#chapter-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 24px; height: 24px; border-radius: 0;
  background: var(--accent);
  border: none;
  transition: transform var(--dur-fast) var(--ease-out);
}
@media (hover: hover) and (pointer: fine) {
  #chapter-slider:hover::-webkit-slider-thumb { transform: scale(1.12); }
}
#chapter-slider:active::-webkit-slider-thumb { transform: scale(0.88); }
#chapter-slider:focus-visible { outline: 2px solid var(--accent); outline-offset: 6px; }

/* Tick marks — 4px tall vertical lines + micro mono labels */
#chapter-ticks {
  display: flex; justify-content: space-between;
  margin-top: 5px; padding: 0 1px;
}
.tick { display: flex; flex-direction: column; align-items: center; gap: 3px; }
.tick-line {
  width: 1px; height: 4px;
  background: var(--border-default); opacity: 0.5;
}
.tick-label {
  font-family: var(--font-mono);
  font-size: 11px; text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-muted);
}

/* ── Timeline ── */
#timeline-bar {
  background: var(--surface-bg);
  border-bottom: 1px solid var(--border-default);
}
#timeline-header { padding: 16px 24px 8px; }
#timeline-header-label {
  font-family: var(--font-mono);
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--text-muted);
}
#timeline-scroll-wrap { position: relative; }
#timeline-scroll-wrap::after {
  content: '';
  position: absolute; top: 0; right: 0; bottom: 0; width: 56px;
  background: linear-gradient(to right, transparent, var(--surface-bg));
  pointer-events: none;
}
#timeline-scroll {
  display: flex; gap: 12px;
  padding: 0 24px 16px;
  overflow-x: auto; scrollbar-width: none;
}
#timeline-scroll::-webkit-scrollbar { display: none; }

.timeline-event {
  flex-shrink: 0; width: 180px; height: 210px;
  perspective: 700px;
}
.tl-inner {
  position: relative; width: 100%; height: 100%;
  transform-style: preserve-3d;
  transition: transform 380ms var(--ease-in-out);
}
.timeline-event.future .tl-inner { transform: rotateY(180deg); }
.tl-front, .tl-back {
  position: absolute; inset: 0; border-radius: 0;
  backface-visibility: hidden; -webkit-backface-visibility: hidden;
}
.tl-front {
  background: var(--surface-card);
  border: 1px solid var(--border-default);
  box-shadow: 3px 3px 0 var(--border-default);
  padding: 10px 12px;
}
/* Active card: accent border + shadow + halftone fill */
.timeline-event.current .tl-front {
  border-color: var(--accent);
  box-shadow: 3px 3px 0 var(--accent);
  background-color: var(--surface-card);
  background-image:
    radial-gradient(circle, rgba(26,26,26,0.10) 1px, transparent 1px),
    radial-gradient(circle, rgba(26,26,26,0.10) 1px, transparent 1px);
  background-size: 8px 8px;
  background-position: 4px 4px, 0 0;
}
.tl-back {
  background: var(--surface-panel);
  border: 1px solid var(--border-default);
  box-shadow: 3px 3px 0 var(--border-default);
  transform: rotateY(180deg);
  display: flex; align-items: center; justify-content: center;
  background-image: radial-gradient(circle, rgba(26,26,26,0.12) 1px, transparent 1px);
  background-size: 8px 8px;
}
.tl-back-mark {
  width: 20px; height: 20px; border-radius: 0;
  border: 1px solid var(--border-default); opacity: 0.3;
}
.timeline-num { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
/* Chapter dot — square, mono */
.tl-dot {
  width: 18px; height: 18px; border-radius: 0;
  background: var(--surface-panel);
  border: 1px solid var(--border-default);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono);
  font-size: 9px; font-weight: 700; color: var(--text-secondary); flex-shrink: 0;
}
.tl-dot.current-dot { background: var(--accent); color: var(--surface-bg); border-color: var(--accent); }
/* Date — 24px mono token (scaled down for card space: keeps mono/uppercase character) */
.timeline-year {
  font-family: var(--font-mono);
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--text-muted);
}
/* Event title — bold sans-serif (UI element) */
.timeline-title {
  font-family: var(--font-sans);
  font-size: 15px; font-weight: 700;
  color: var(--text-primary); line-height: 1.3; margin-bottom: 5px;
}
/* Description — sans regular */
.timeline-desc {
  font-family: var(--font-sans);
  font-size: 13px; font-style: normal;
  color: var(--text-secondary); line-height: 1.55;
}

/* ── Main grid ── */
#cluster-grid {
  columns: 3; column-gap: 20px;
  padding: 24px 24px 48px;
}

/* ── Family card — uniform border, colored shadow, halftone header ── */
.family-card {
  background: var(--surface-card);
  border: 1px solid var(--border-subtle);
  border-radius: 0;
  box-shadow: 3px 3px 0 var(--family-color, rgba(62,44,27,0.18));
  overflow: hidden;
  break-inside: avoid;
  margin-bottom: 20px;
}
.family-card-header {
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--border-subtle);
  background: var(--surface-panel);
  background-image:
    radial-gradient(circle, rgba(26,26,26,0.09) 1px, transparent 1px),
    radial-gradient(circle, rgba(26,26,26,0.09) 1px, transparent 1px);
  background-size: 8px 8px;
  background-position: 4px 4px, 0 0;
}
/* Family summary — italic subtitle below surname */
.family-summary {
  display: block;
  font-family: var(--font-mono);
  font-size: 10px; font-weight: 400;
  letter-spacing: 0.10em; text-transform: uppercase;
  color: var(--text-muted);
  margin-top: 5px;
  font-style: normal;
}

/* Revealed character detail — accent orange, second line */
.char-reveal {
  display: block;
  font-family: var(--font-sans);
  font-size: 12px; font-weight: 400;
  color: var(--accent);
  line-height: 1.45;
  margin-top: 3px;
  animation: cardIn 280ms var(--ease-out) backwards;
}

/* Family card header — two-tier like "Chapter 01" */
.family-card-header h2 { line-height: 1; }
.family-surname {
  display: block;
  font-family: var(--font-sans);
  font-size: 22px; font-weight: 700;
  letter-spacing: 0.03em; text-transform: uppercase;
  color: var(--family-color, var(--text-primary));
  line-height: 1.1;
}
.family-word {
  display: block;
  font-family: var(--font-mono);
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--text-muted);
  margin-top: 3px;
}

/* ── Character entry cards ── */
/* Panel tray — gives mini-cards a background to sit on */
.char-list {
  padding: 10px;
  display: flex; flex-direction: column; gap: 8px;
  background: var(--surface-panel);
}
/* Each member = isolated mini-card: cream surface, 1px espresso border, sharp corners */
.char-row {
  display: flex; flex-direction: column; gap: 4px;
  background: var(--surface-card);
  border: 1px solid var(--border-default);
  padding: 10px 12px;
}

/* Name row wrapper — aligns dot + name */
.char-name-row { display: flex; align-items: center; gap: 7px; }

/* Color-coded square dot for primary characters */
.char-dot {
  width: 8px; height: 8px; flex-shrink: 0;
  background: var(--family-color, var(--border-default));
}

/* Names — consistent 15px, weight-only distinction */
.char-name {
  font-family: var(--font-sans);
  font-size: 15px; font-weight: 400;
  color: var(--text-secondary); line-height: 1.3;
}
.char-name.primary {
  font-weight: 700;
  color: var(--text-primary);
}
/* Roles — sans regular */
.char-role {
  font-family: var(--font-sans);
  font-size: 13px; font-weight: 400; font-style: normal;
  color: var(--text-secondary); line-height: 1.4;
}

/* ── Stagger entry for family cards ── */
@keyframes cardIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.family-card {
  animation: cardIn 300ms var(--ease-out) backwards;
  animation-delay: calc(var(--card-index, 0) * 40ms);
}

/* ── Chapter number update pulse ── */
@keyframes chapterPop {
  0%   { opacity: 1;   transform: scale(1); }
  35%  { opacity: 0.5; transform: scale(0.93); }
  100% { opacity: 1;   transform: scale(1); }
}
#chapter-val.updating {
  animation: chapterPop 220ms var(--ease-out);
}

/* ── Family card hover lift ── */
.family-card {
}

/* ── Char-row ── */
.char-row {
}

/* ── Responsive ── */
@media (max-width: 700px) {
  #header-top { padding: 12px 16px; }
  #chapter-strip { padding: 12px 16px 14px; position: static; }
  #chapter-val { font-size: 20px; }
  #timeline-header { padding: 12px 16px 6px; }
  #timeline-scroll { padding: 0 16px 12px; }
  #cluster-grid { columns: 1; padding: 16px 16px 32px; }
  .family-card { margin-bottom: 16px; }
}
@media (min-width: 701px) and (max-width: 1100px) {
  #cluster-grid { columns: 2; }
}
</style>
</head>

  <div id="header-top">

<div id="main">
  <div id="chapter-strip">

  <div id="timeline-bar">

  <div id="cluster-grid"></div>
</div>

<script>
const FAMILIES = [

      { name:'Rino (Younger)', role:'Lila\'s son', firstChapter:87,

  },
  {

    summary:'The Don Achille Family',

      { name:'Donna Maria', role:'Wife', reveals:[] },
      { name:'Stefano Carracci', primary:true, role:'Eldest son',

      { name:'Alfonso Carracci', primary:true, role:'Younger son',

      { name:'Pinuccia', role:'Daughter', reveals:[] },

  {
    id:'peluso', name:'Peluso Family', color:'var(--cluster-peluso)',

          {chapter:1,  text:'Carpenter'},
          {chapter:15, text:'Accused of murdering Don Achille Carracci'},
        ]},
      { name:'Giuseppina Peluso', role:'Mother', reveals:[] },
      { name:'Pasquale Peluso', primary:true, role:'Eldest son',
        reveals:[
          {chapter:35, text:'Construction worker and passionate Communist'},
          {chapter:45, text:'Harbours romantic feelings for Lila'},
        ]},
      { name:'Carmela (Carmen) Peluso', primary:true, role:'Daughter',
        reveals:[
          {chapter:5, text:'Close friend to both Elena and Lila'},

  },
  {
    id:'sarratore', name:'Sarratore Family', color:'var(--cluster-sarratore)',

        reveals:[
          {chapter:1,  text:'Railroad worker and amateur poet'},

          {chapter:75, text:'Hosts Elena on Ischia — crosses a serious boundary with her'},

      { name:'Lidia Sarratore', role:'Mother', reveals:[] },
      { name:'Nino Sarratore', primary:true, role:'Eldest son',
        reveals:[

const TIMELINE = [
  {num:1, year:'1944–45', chapter:1,  title:'Childhood in Rione',       desc:'Elena and Lila meet as little girls in the postwar years in the poor neighbourhood of Naples.'},
  {num:2, year:'1947–48', chapter:5,  title:'Elementary School',         desc:'They begin school with Maestra Oliviero who recognises their extraordinary intelligence.'},
  {num:3, year:'1949',    chapter:15, title:"Don Achille's Murder",       desc:'Don Achille Carracci, the neighbourhood "ogre", is murdered. Alfredo Peluso is accused.'},
  {num:4, year:'1950',    chapter:25, title:'End of Elementary School',   desc:'Elena graduates top of class. Maestra Oliviero secures her middle school place — but Lila is denied.'},
  {num:5, year:'1950–51', chapter:35, title:'New Paths',                  desc:'Elena begins middle school far from the Rione. Lila stays behind, helping her father in the shoe shop.'},
  {num:6, year:'1951–52', chapter:45, title:'Adolescence & Awakening',    desc:"Elena's intense infatuation with Nino Sarratore deepens. She befriends Marisa to be near him."},
  {num:7, year:'1952',    chapter:55, title:'Teenage Romances',           desc:'Elena has a brief romance with Gino, then begins a relationship with Antonio Cappuccio.'},
  {num:8, year:'1952',    chapter:65, title:'Lila & the Solaras',         desc:'Marcello Solara pursues Lila aggressively for marriage, but she ultimately rejects him.'},
  {num:9, year:'1953',    chapter:75, title:'Summer on Ischia',           desc:'Elena spends the summer on Ischia — a rare freedom, and the threshold of young adulthood.'},
  {num:10,year:'1952–53', chapter:87, title:'Lila Marries Stefano',       desc:'At sixteen, Lila marries Stefano Carracci and enters a life of wealth — but also confinement.'},
];

const ERAS = [
  {max:10, label:'Childhood in Rione'},
  {max:25, label:'Elementary School Years'},
  {max:40, label:'Diverging Paths'},
  {max:55, label:'Adolescence & Awakening'},
  {max:70, label:'Teenage Romances'},
  {max:80, label:'Lila & the Solaras'},
  {max:87, label:'The Wedding'},
];

let currentChapter = 1;
function currentEra(){ return (ERAS.find(e=>currentChapter<=e.max)||ERAS[ERAS.length-1]).label; }

function renderCards(){
  const grid = document.getElementById('cluster-grid');
  grid.innerHTML = '';
  let visibleIdx = 0;
  FAMILIES.forEach((family)=>{
    if ((family.firstChapter || 1) > currentChapter) return;

    const card = document.createElement('div');
    card.className = 'family-card';
    card.style.setProperty('--family-color', family.color);
    card.style.setProperty('--card-index', visibleIdx++);

    const nameParts = family.name.split(' ');
    const surname = nameParts.slice(0, -1).join(' ');
    const header = document.createElement('div');
    header.className = 'family-card-header';
    header.innerHTML = `<h2><span class="family-surname">${surname}</span></h2>`
      + (family.summary ? `<span class="family-summary">${family.summary}</span>` : '');
    card.appendChild(header);

    const list = document.createElement('div');
    list.className = 'char-list';
    family.members.forEach(m=>{
      if ((m.firstChapter || 1) > currentChapter) return;
      const row = document.createElement('div');
      row.className = 'char-row';
      const dot = m.primary ? `<span class="char-dot"></span>` : '';
      const visibleReveals = (m.reveals || []).filter(r => r.chapter <= currentChapter);
      const revealsHTML = visibleReveals.map(r => `<span class="char-reveal">${r.text}</span>`).join('');
      row.innerHTML = `<div class="char-name-row">${dot}<span class="char-name${m.primary?' primary':''}">${m.name}</span></div>`
        + (m.role ? `<span class="char-role">${m.role}</span>` : '')
        + revealsHTML;
      list.appendChild(row);
    });
    card.appendChild(list);
    grid.appendChild(card);
  });
}

const slider     = document.getElementById('chapter-slider');
const sliderWrap = document.getElementById('slider-wrap');
const thumbArrow = document.getElementById('thumb-arrow');

function updateArrows(){
  const ch = parseInt(slider.value);
  const isFirst = ch === parseInt(slider.min);
  const isLast  = ch === parseInt(slider.max);
  if (isFirst) {
    thumbArrow.textContent = '→';
    thumbArrow.classList.add('pulse');
  } else if (isLast) {
    thumbArrow.textContent = '←';
    thumbArrow.classList.remove('pulse');
  } else {
    thumbArrow.textContent = '↔';
    thumbArrow.classList.remove('pulse');
  }
}

function updateSlider(){
  const pct = ((slider.value-slider.min)/(slider.max-slider.min))*100;
  sliderWrap.style.setProperty('--pct', pct);
  const valEl = document.getElementById('chapter-val');
  valEl.textContent = String(slider.value).padStart(2,'0');
  valEl.classList.remove('updating');
  void valEl.offsetWidth; // force reflow to restart animation
  valEl.classList.add('updating');
  document.getElementById('chapter-era').textContent = currentEra();
  updateArrows();
  renderTimeline();
  renderCards();
}
slider.addEventListener('input',()=>{
  currentChapter=parseInt(slider.value,10);
  updateSlider();
  if(window.posthog){
    posthog.capture('slider_moved',{chapter:currentChapter});
    if(currentChapter===parseInt(slider.max,10)) posthog.capture('explored_full_book');
  }
});

function renderTimeline(){
  const scroll = document.getElementById('timeline-scroll');
  scroll.innerHTML = '';
  TIMELINE.forEach((ev,idx)=>{
    const isFuture  = ev.chapter > currentChapter;
    const isCurrent = !isFuture && (idx===TIMELINE.length-1 || TIMELINE[idx+1].chapter>currentChapter);
    const div = document.createElement('div');
    div.className = 'timeline-event'+(isFuture?' future':'')+(isCurrent?' current':'');
    div.innerHTML = `
      <div class="tl-inner">
        <div class="tl-front">
          <div class="timeline-num">
            <div class="tl-dot${isCurrent?' current-dot':''}">${ev.num}</div>
            <span class="timeline-year">${ev.year}</span>
          </div>
          <div class="timeline-title">${ev.title}</div>
          <div class="timeline-desc">${ev.desc}</div>
        </div>
        <div class="tl-back"><div class="tl-back-mark"></div></div>
      </div>`;
    scroll.appendChild(div);
  });
}

renderCards();
updateSlider();
</script>
