<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Brilliant Friend by Elena Ferrante — Book Companion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  /* ── Family identity colors ── */
  --cluster-greco:     #1A3A5C;
  --cluster-cerullo:   #6B1F7A;
  --cluster-carracci:  #B5411C;
  --cluster-peluso:    #1E5C30;
  --cluster-sarratore: #7A5A0A;
  --cluster-cappuccio: #0F5470;
  --cluster-solara:    #9E1F23;
  --cluster-scanno:    #2A5C40;
  --cluster-spagnuolo: #5A2A5A;
  --cluster-other:     #3E3830;

  /* ── Industrial Editorial v2.0 palette ── */
  --surface-bg:    #F4EAD5;
  --surface-panel: #DBCBAF;
  --surface-card:  #F4EAD5;
  --surface-hover: #EDE0C4;
  --text-primary:  #2A1A0A;
  --text-secondary:#4A3020;
  --text-muted:    rgba(42,26,10,0.60);
  --border-subtle: rgba(42,26,10,0.28);
  --border-default:#3E2C1B;
  --accent:        #0033CC;   /* ultramarine — active states only */

  /* ── Dual-type system ── */
  --font-sans:  "Helvetica Neue", "Inter", sans-serif;   /* UI labels, names */
  --font-mono:  "Space Mono", "Roboto Mono", monospace;  /* data, numbers, dates */
  --font-serif: "Playfair Display", "Georgia", serif;    /* narrative, bios, descriptions */

  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --dur-fast: 140ms;
}

*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-sans);
  background: var(--surface-bg);
  color: var(--text-primary);
  height: 100dvh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
#header {
  flex-shrink: 0;
  background: var(--surface-panel);
  border-bottom: 1px solid var(--border-default);
  z-index: 20;
}
#header-top { padding: 14px 24px; }
#header h1 {
  font-family: var(--font-mono);
  font-size: 13px; font-weight: 700;
  letter-spacing: 0.10em; text-transform: uppercase;
  color: var(--text-secondary);
}
#header h1 span { color: var(--text-primary); }

/* ── Main scroll container ── */
#main { flex: 1; overflow-y: auto; }

/* ── Chapter strip ── */
#chapter-strip {
  padding: 16px 24px 18px;
  border-bottom: 1px solid var(--border-default);
  background: var(--surface-panel);
  position: sticky; top: 0; z-index: 10;
}
#chapter-strip-label {
  display: flex; align-items: baseline; gap: 10px;
  margin-bottom: 14px; flex-wrap: wrap;
}
#chapter-label-text {
  font-family: var(--font-sans);
  font-size: 18px; font-weight: 700;
  letter-spacing: -0.01em; text-transform: none;
  color: var(--text-primary);
}
/* Chapter number — 28px uppercase mono token */
#chapter-val {
  font-family: var(--font-mono);
  font-size: 28px; font-weight: 700;
  text-transform: uppercase;
  color: var(--accent);
  line-height: 1; min-width: 2ch;
}
#chapter-val-suffix {
  font-family: var(--font-mono);
  font-size: 12px; letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-muted);
}
/* Era name — serif, narrative role */
#chapter-era {
  font-family: var(--font-serif);
  font-size: 17px; font-style: italic;
  color: var(--text-secondary);
}

/* ── Chapter scroller: 1px espresso track + 4px ticks + square ultramarine node ── */
#chapter-slider {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 1px;
  background: var(--border-default);
  outline: none; cursor: pointer;
}
#chapter-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px; border-radius: 0;
  background: var(--accent);
  border: none;
  transition: transform var(--dur-fast) var(--ease-out);
}
#chapter-slider:hover::-webkit-slider-thumb { transform: scale(1.15); }
#chapter-slider:active::-webkit-slider-thumb { transform: scale(0.9); }
#chapter-slider:focus-visible { outline: 2px solid var(--accent); outline-offset: 6px; }

/* Tick marks — 4px tall vertical lines + micro mono labels */
#chapter-ticks {
  display: flex; justify-content: space-between;
  margin-top: 5px; padding: 0 1px;
}
.tick { display: flex; flex-direction: column; align-items: center; gap: 3px; }
.tick-line {
  width: 1px; height: 4px;
  background: var(--border-default); opacity: 0.5;
}
.tick-label {
  font-family: var(--font-mono);
  font-size: 11px; text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-muted);
}

/* ── Timeline ── */
#timeline-bar {
  background: var(--surface-bg);
  border-bottom: 1px solid var(--border-default);
}
#timeline-header { padding: 16px 24px 8px; }
#timeline-header-label {
  font-family: var(--font-mono);
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--text-muted);
}
#timeline-scroll-wrap { position: relative; }
#timeline-scroll-wrap::after {
  content: '';
  position: absolute; top: 0; right: 0; bottom: 0; width: 56px;
  background: linear-gradient(to right, transparent, var(--surface-bg));
  pointer-events: none;
}
#timeline-scroll {
  display: flex; gap: 12px;
  padding: 0 24px 16px;
  overflow-x: auto; scrollbar-width: none;
}
#timeline-scroll::-webkit-scrollbar { display: none; }

.timeline-event {
  flex-shrink: 0; width: 180px; height: 172px;
  perspective: 700px;
}
.tl-inner {
  position: relative; width: 100%; height: 100%;
  transform-style: preserve-3d;
  transition: transform 520ms cubic-bezier(0.45, 0, 0.55, 1);
}
.timeline-event.future .tl-inner { transform: rotateY(180deg); }
.tl-front, .tl-back {
  position: absolute; inset: 0; border-radius: 0;
  backface-visibility: hidden; -webkit-backface-visibility: hidden;
}
.tl-front {
  background: var(--surface-card);
  border: 1px solid var(--border-default);
  box-shadow: 3px 3px 0 var(--border-default);
  padding: 10px 12px;
  transition: box-shadow var(--dur-fast), transform var(--dur-fast);
}
.timeline-event:not(.future):hover .tl-front {
  box-shadow: 5px 5px 0 var(--border-default);
  transform: translate(-1px, -1px);
}
/* Active card: accent border + shadow + halftone fill */
.timeline-event.current .tl-front {
  border-color: var(--accent);
  box-shadow: 3px 3px 0 var(--accent);
  background-color: var(--surface-card);
  background-image:
    radial-gradient(circle, rgba(62,44,27,0.10) 1px, transparent 1px),
    radial-gradient(circle, rgba(62,44,27,0.10) 1px, transparent 1px);
  background-size: 8px 8px;
  background-position: 4px 4px, 0 0;
}
.tl-back {
  background: var(--surface-panel);
  border: 1px solid var(--border-default);
  box-shadow: 3px 3px 0 var(--border-default);
  transform: rotateY(180deg);
  display: flex; align-items: center; justify-content: center;
  background-image: radial-gradient(circle, rgba(62,44,27,0.12) 1px, transparent 1px);
  background-size: 8px 8px;
}
.tl-back-mark {
  width: 20px; height: 20px; border-radius: 0;
  border: 1px solid var(--border-default); opacity: 0.3;
}
.timeline-num { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
/* Chapter dot — square, mono */
.tl-dot {
  width: 18px; height: 18px; border-radius: 0;
  background: var(--surface-panel);
  border: 1px solid var(--border-default);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono);
  font-size: 9px; font-weight: 700; color: var(--text-secondary); flex-shrink: 0;
}
.tl-dot.current-dot { background: var(--accent); color: var(--surface-bg); border-color: var(--accent); }
/* Date — 24px mono token (scaled down for card space: keeps mono/uppercase character) */
.timeline-year {
  font-family: var(--font-mono);
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--text-muted);
}
/* Event title — bold sans-serif (UI element) */
.timeline-title {
  font-family: var(--font-sans);
  font-size: 15px; font-weight: 700;
  color: var(--text-primary); line-height: 1.3; margin-bottom: 5px;
}
/* Description — serif (narrative content) */
.timeline-desc {
  font-family: var(--font-serif);
  font-size: 13px; font-style: italic;
  color: var(--text-secondary); line-height: 1.55;
}

/* ── Main grid ── */
#cluster-grid {
  columns: 3; column-gap: 20px;
  padding: 24px 24px 48px;
}

/* ── Family card — sepia surface, espresso border + offset shadow ── */
.family-card {
  background: var(--surface-card);
  border: 1px solid var(--border-subtle);
  border-left-width: 3px;
  border-radius: 0;
  box-shadow: 3px 3px 0 rgba(62,44,27,0.18);
  overflow: hidden;
  break-inside: avoid;
  margin-bottom: 20px;
}
.family-card-header {
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--border-subtle);
  background: var(--surface-panel);
}
/* Family card header — two-tier like "Chapter 01" */
.family-card-header h2 { line-height: 1; }
.family-surname {
  display: block;
  font-family: var(--font-sans);
  font-size: 22px; font-weight: 700;
  letter-spacing: 0.03em; text-transform: uppercase;
  color: var(--family-color, var(--text-primary));
  line-height: 1.1;
}
.family-word {
  display: block;
  font-family: var(--font-mono);
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--text-muted);
  margin-top: 3px;
}

/* ── Character rows ── */
.char-list { padding: 12px 16px 16px; display: flex; flex-direction: column; gap: 10px; }
.char-row { display: flex; flex-direction: column; gap: 3px; }

/* Names — consistent 15px, weight-only distinction */
.char-name {
  font-family: var(--font-sans);
  font-size: 15px; font-weight: 400;
  color: var(--text-secondary); line-height: 1.4;
}
.char-name.primary {
  font-weight: 700;
  color: var(--text-primary);
}
/* Roles — sans regular (more readable than serif italic) */
.char-role {
  font-family: var(--font-sans);
  font-size: 13px; font-weight: 400; font-style: normal;
  color: var(--text-secondary); line-height: 1.45;
}

/* ── Responsive ── */
@media (max-width: 700px) {
  #header-top { padding: 12px 16px; }
  #chapter-strip { padding: 12px 16px 14px; position: static; }
  #chapter-val { font-size: 20px; }
  #timeline-header { padding: 12px 16px 6px; }
  #timeline-scroll { padding: 0 16px 12px; }
  #cluster-grid { columns: 1; padding: 16px 16px 32px; }
  .family-card { margin-bottom: 16px; }
}
@media (min-width: 701px) and (max-width: 1100px) {
  #cluster-grid { columns: 2; }
}
</style>
</head>
<body>

<div id="header">
  <div id="header-top">
    <h1>My Brilliant Friend <span>by Elena Ferrante</span> &mdash; <span>Book Companion</span></h1>
  </div>
</div>

<div id="main">
  <div id="chapter-strip">
    <div id="chapter-strip-label">
      <span id="chapter-label-text">Chapter</span>
      <span id="chapter-val">1</span>
      <span id="chapter-val-suffix">of 87 —</span>
      <span id="chapter-era">Childhood in Rione</span>
    </div>
    <input type="range" id="chapter-slider" min="1" max="87" value="1">
    <div id="chapter-ticks">
      <div class="tick"><div class="tick-line"></div><span class="tick-label">01</span></div>
      <div class="tick"><div class="tick-line"></div><span class="tick-label">10</span></div>
      <div class="tick"><div class="tick-line"></div><span class="tick-label">20</span></div>
      <div class="tick"><div class="tick-line"></div><span class="tick-label">30</span></div>
      <div class="tick"><div class="tick-line"></div><span class="tick-label">40</span></div>
      <div class="tick"><div class="tick-line"></div><span class="tick-label">50</span></div>
      <div class="tick"><div class="tick-line"></div><span class="tick-label">60</span></div>
      <div class="tick"><div class="tick-line"></div><span class="tick-label">70</span></div>
      <div class="tick"><div class="tick-line"></div><span class="tick-label">87</span></div>
    </div>
  </div>
  <div id="timeline-bar">
    <div id="timeline-header">
      <span id="timeline-header-label">Timeline of Key Events</span>
    </div>
    <div id="timeline-scroll-wrap">
      <div id="timeline-scroll"></div>
    </div>
  </div>
  <div id="cluster-grid"></div>
</div>

<script>
const FAMILIES = [
  {
    id:'greco', name:'Greco Family', color:'var(--cluster-greco)', cols:3,
    members:[
      { name:'Elena "Lenù" Greco', primary:true, role:'Protagonist & narrator' },
      { name:'Mr. Greco',                         role:'City hall porter' },
      { name:'Mrs. Greco',                        role:'Strict mother with a limp, resents Elena\'s ambitions' },
      { name:'Peppe',                             role:'Younger sibling' },
      { name:'Gianni',                            role:'Younger sibling' },
      { name:'Elisa',                             role:'Younger sibling, later linked to Solaras' },
    ]
  },
  {
    id:'cerullo', name:'Cerullo Family', color:'var(--cluster-cerullo)', cols:3,
    members:[
      { name:'Raffaella "Lila" Cerullo', primary:true, role:'Elena\'s best friend, fiercely brilliant' },
      { name:'Fernando Cerullo',                       role:'Shoemaker, strict and volatile father' },
      { name:'Nunzia Cerullo',                         role:'Lila\'s mother' },
      { name:'Rino Cerullo (Elder)', primary:true,     role:'Older brother, Lila\'s shoe collaborator' },
      { name:'Rino (Younger)',                         role:'Lila\'s son, named after her brother' },
    ]
  },
  {
    id:'carracci', name:'Carracci Family', color:'var(--cluster-carracci)', cols:2,
    members:[
      { name:'Don Achille †',                      role:'Feared loan shark, murdered in childhood' },
      { name:'Donna Maria',                         role:'Don Achille\'s wife' },
      { name:'Stefano Carracci', primary:true,      role:'Grocer, marries Lila at sixteen' },
      { name:'Alfonso Carracci', primary:true,      role:'Sweet, intelligent classmate' },
      { name:'Pinuccia',                            role:'Stefano\'s sister' },
    ]
  },
  {
    id:'peluso', name:'Peluso Family', color:'var(--cluster-peluso)', cols:2,
    members:[
      { name:'Alfredo',                             role:'Carpenter ruined by Don Achille' },
      { name:'Giuseppina',                          role:'Alfredo\'s wife' },
      { name:'Pasquale Peluso', primary:true,       role:'Communist labourer, loves Lila' },
      { name:'Carmela (Carmen) Peluso', primary:true, role:'Close friend to Elena & Lila' },
    ]
  },
  {
    id:'sarratore', name:'Sarratore Family', color:'var(--cluster-sarratore)', cols:2,
    members:[
      { name:'Donato Sarratore', primary:true,  role:'Railroad worker, poet, serial womaniser' },
      { name:'Lidia',                            role:'Donato\'s long-suffering wife' },
      { name:'Nino Sarratore', primary:true,    role:'Elena\'s lifelong obsession' },
      { name:'Marisa Sarratore', primary:true,  role:'Nino\'s sister, befriended by Elena' },
      { name:'Pino',                             role:'Younger sibling' },
      { name:'Clelia',                           role:'Younger sibling' },
      { name:'Ciro',                             role:'Youngest sibling' },
    ]
  },
  {
    id:'cappuccio', name:'Cappuccio Family', color:'var(--cluster-cappuccio)', cols:2,
    members:[
      { name:'Melina Cappuccio', primary:true,   role:'Unstable widow, Donato\'s former lover' },
      { name:'Antonio Cappuccio', primary:true,  role:'Mechanic, Elena\'s teenage boyfriend' },
      { name:'Ada',                              role:'Antonio\'s sister' },
    ]
  },
  {
    id:'solara', name:'Solara Family', color:'var(--cluster-solara)', cols:2,
    members:[
      { name:'Silvio Solara',                    role:'Violent bar owner, Camorra-linked' },
      { name:'Manuela Solara',                   role:'Manages the family\'s debt book' },
      { name:'Marcello Solara', primary:true,    role:'Pursues Lila obsessively' },
      { name:'Michele Solara', primary:true,     role:'Colder, more calculating brother' },
    ]
  },
  {
    id:'scanno', name:'Scanno Family', color:'var(--cluster-scanno)', cols:2,
    members:[
      { name:'Nicola',                           role:'Fruit & vegetable seller' },
      { name:'Assunta',                          role:'Nicola\'s wife' },
      { name:'Enzo Scanno', primary:true,        role:'Classmate, steadfastly devoted to Lila' },
    ]
  },
  {
    id:'spagnuolo', name:'Spagnuolo Family', color:'var(--cluster-spagnuolo)', cols:2,
    members:[
      { name:'Signor Spagnuolo',                 role:'Pastry maker at Bar Solara' },
      { name:'Rosa',                             role:'His wife' },
      { name:'Gigliola Spagnuolo', primary:true, role:'Classmate, dates Michele Solara' },
    ]
  },
  {
    id:'other', name:'Other Key Characters', color:'var(--cluster-other)', cols:4,
    members:[
      { name:'Maestra Oliviero', primary:true,   role:'Teacher who fights for Elena\'s education' },
      { name:'Maestro Ferraro',                  role:'Teacher & neighbourhood librarian' },
      { name:'Gino', primary:true,               role:'Son of the local pharmacist; Elena\'s first boyfriend' },
      { name:'Nella Incardo',                    role:'Maestra Oliviero\'s cousin; hosts Elena on Ischia' },
      { name:'Prof. Gerace',                     role:'High school teacher' },
      { name:'Prof. Galiani',                    role:'Intellectual mentor to Elena' },
      { name:'Pietro Airota',                    role:'Inflexible academic; Elena\'s future husband' },
    ]
  },
];

const TIMELINE = [
  {num:1, year:'1944–45', chapter:1,  title:'Childhood in Rione',       desc:'Elena and Lila meet as little girls in the postwar years in the poor neighbourhood of Naples.'},
  {num:2, year:'1947–48', chapter:5,  title:'Elementary School',         desc:'They begin school with Maestra Oliviero who recognises their extraordinary intelligence.'},
  {num:3, year:'1949',    chapter:15, title:"Don Achille's Murder",       desc:'Don Achille Carracci, the neighbourhood "ogre", is murdered. Alfredo Peluso is accused.'},
  {num:4, year:'1950',    chapter:25, title:'End of Elementary School',   desc:'Elena graduates top of class. Maestra Oliviero secures her middle school place — but Lila is denied.'},
  {num:5, year:'1950–51', chapter:35, title:'New Paths',                  desc:'Elena begins middle school far from the Rione. Lila stays behind, helping her father in the shoe shop.'},
  {num:6, year:'1951–52', chapter:45, title:'Adolescence & Awakening',    desc:"Elena's intense infatuation with Nino Sarratore deepens. She befriends Marisa to be near him."},
  {num:7, year:'1952',    chapter:55, title:'Teenage Romances',           desc:'Elena has a brief romance with Gino, then begins a relationship with Antonio Cappuccio.'},
  {num:8, year:'1952',    chapter:65, title:'Lila & the Solaras',         desc:'Marcello Solara pursues Lila aggressively for marriage, but she ultimately rejects him.'},
  {num:9, year:'1953',    chapter:75, title:'Summer on Ischia',           desc:'Elena spends the summer on Ischia — a rare freedom, and the threshold of young adulthood.'},
  {num:10,year:'1952–53', chapter:87, title:'Lila Marries Stefano',       desc:'At sixteen, Lila marries Stefano Carracci and enters a life of wealth — but also confinement.'},
];

const ERAS = [
  {max:10, label:'Childhood in Rione'},
  {max:25, label:'Elementary School Years'},
  {max:40, label:'Diverging Paths'},
  {max:55, label:'Adolescence & Awakening'},
  {max:70, label:'Teenage Romances'},
  {max:80, label:'Lila & the Solaras'},
  {max:87, label:'The Wedding'},
];

let currentChapter = 1;
function currentEra(){ return (ERAS.find(e=>currentChapter<=e.max)||ERAS[ERAS.length-1]).label; }

function renderCards(){
  const grid = document.getElementById('cluster-grid');
  grid.innerHTML = '';
  FAMILIES.forEach(family=>{
    const card = document.createElement('div');
    card.className = 'family-card';

    card.style.borderLeftColor = family.color;
    card.style.setProperty('--family-color', family.color);

    const header = document.createElement('div');
    header.className = 'family-card-header';
    const nameParts = family.name.split(' ');
    const surname = nameParts.slice(0, -1).join(' ');
    const familyWord = nameParts[nameParts.length - 1];
    header.innerHTML = `<h2><span class="family-surname">${surname}</span><span class="family-word">${familyWord}</span></h2>`;
    card.appendChild(header);

    const list = document.createElement('div');
    list.className = 'char-list';
    family.members.forEach(m=>{
      const row = document.createElement('div');
      row.className = 'char-row';
      row.innerHTML = `<span class="char-name${m.primary?' primary':''}">${m.name}</span>`
        + (m.role ? `<span class="char-role">${m.role}</span>` : '');
      list.appendChild(row);
    });
    card.appendChild(list);
    grid.appendChild(card);
  });
}

const slider = document.getElementById('chapter-slider');
function updateSlider(){
  const pct = ((slider.value-slider.min)/(slider.max-slider.min))*100;
  slider.style.setProperty('--pct', pct);
  document.getElementById('chapter-val').textContent = String(slider.value).padStart(2,'0');
  document.getElementById('chapter-era').textContent = currentEra();
  renderTimeline();
}
slider.addEventListener('input',()=>{ currentChapter=parseInt(slider.value,10); updateSlider(); });

function renderTimeline(){
  const scroll = document.getElementById('timeline-scroll');
  scroll.innerHTML = '';
  TIMELINE.forEach((ev,idx)=>{
    const isFuture  = ev.chapter > currentChapter;
    const isCurrent = !isFuture && (idx===TIMELINE.length-1 || TIMELINE[idx+1].chapter>currentChapter);
    const div = document.createElement('div');
    div.className = 'timeline-event'+(isFuture?' future':'')+(isCurrent?' current':'');
    div.innerHTML = `
      <div class="tl-inner">
        <div class="tl-front">
          <div class="timeline-num">
            <div class="tl-dot${isCurrent?' current-dot':''}">${ev.num}</div>
            <span class="timeline-year">${ev.year}</span>
          </div>
          <div class="timeline-title">${ev.title}</div>
          <div class="timeline-desc">${ev.desc}</div>
        </div>
        <div class="tl-back"><div class="tl-back-mark"></div></div>
      </div>`;
    scroll.appendChild(div);
  });
}

renderCards();
updateSlider();
</script>
</body>
</html>
