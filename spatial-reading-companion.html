<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Brilliant Friend — Character Relationships</title>
<style>
:root {
  --cluster-greco:     #1A3A5C;
  --cluster-cerullo:   #7B2D8B;
  --cluster-carracci:  #B5411C;
  --cluster-peluso:    #2E6B3E;
  --cluster-sarratore: #8B6914;
  --cluster-cappuccio: #1D6B8A;
  --cluster-solara:    #A0272B;
  --cluster-scanno:    #3D6B4F;
  --cluster-spagnuolo: #6B3A6B;
  --cluster-other:     #4A4A5A;

  --surface-bg:    #0D1117;
  --surface-panel: #161B22;
  --surface-card:  #1C2431;
  --surface-hover: #252D3A;

  --text-primary:   #E6EDF3;
  --text-secondary: #8B949E;
  --text-muted:     #484F58;

  --border-subtle:  rgba(255,255,255,0.07);
  --border-default: rgba(255,255,255,0.12);

  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --dur-fast: 140ms;
  --dur-med:  260ms;
}

*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--surface-bg);
  color: var(--text-primary);
  height: 100dvh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
#header {
  flex-shrink: 0;
  background: var(--surface-panel);
  border-bottom: 1px solid var(--border-subtle);
  z-index: 20;
}
#header-top {
  padding: 14px 24px;
  border-bottom: 1px solid var(--border-subtle);
}
#header h1 {
  font-size: 12px; font-weight: 600;
  letter-spacing: .09em; text-transform: uppercase;
  color: var(--text-secondary);
}
#header h1 span { color: var(--text-primary); }

/* ── Chapter strip ── */
#chapter-strip {
  padding: 12px 24px 14px;
  border-bottom: 1px solid var(--border-subtle);
  background: var(--surface-bg);
}
#chapter-strip-label {
  display: flex; align-items: baseline; gap: 6px;
  margin-bottom: 10px;
}
#chapter-label-text {
  font-size: 10px; font-weight: 700;
  letter-spacing: .12em; text-transform: uppercase;
  color: var(--text-muted);
}
#chapter-val {
  font-size: 22px; font-weight: 700;
  color: var(--text-primary);
  line-height: 1; min-width: 36px; letter-spacing: -.02em;
}
#chapter-val-suffix { font-size: 12px; color: var(--text-muted); }
#chapter-era { font-size: 12px; color: var(--text-secondary); font-style: italic; }

#chapter-slider {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 4px; border-radius: 2px;
  background: linear-gradient(
    to right,
    var(--text-primary) 0%,
    var(--text-primary) calc(var(--pct,0%) * 1%),
    var(--surface-hover) calc(var(--pct,0%) * 1%),
    var(--surface-hover) 100%
  );
  outline: none; cursor: pointer;
}
#chapter-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--text-primary);
  border: 3px solid var(--surface-bg);
  box-shadow: 0 0 0 1.5px rgba(255,255,255,.25), 0 2px 8px rgba(0,0,0,.5);
  transition: transform var(--dur-fast);
}
#chapter-slider:active::-webkit-slider-thumb { transform: scale(1.15); }
#chapter-ticks { display: flex; justify-content: space-between; margin-top: 6px; padding: 0 2px; }
#chapter-ticks span { font-size: 10px; color: var(--text-muted); }

/* ── Timeline ── */
#timeline-bar { background: var(--surface-panel); }
#timeline-header { padding: 10px 24px 6px; }
#timeline-header-label {
  font-size: 10px; font-weight: 700;
  letter-spacing: .12em; text-transform: uppercase;
  color: var(--text-muted);
}
#timeline-scroll {
  display: flex; gap: 10px;
  padding: 0 24px 12px;
  overflow-x: auto; scrollbar-width: thin;
  scrollbar-color: var(--border-default) transparent;
}
#timeline-scroll::-webkit-scrollbar { height: 3px; }
#timeline-scroll::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 2px; }

.timeline-event {
  flex-shrink: 0; width: 156px; height: 148px;
  perspective: 700px;
}
.tl-inner {
  position: relative; width: 100%; height: 100%;
  transform-style: preserve-3d;
  transition: transform 520ms cubic-bezier(0.45, 0, 0.55, 1);
}
.timeline-event.future .tl-inner { transform: rotateY(180deg); }
.tl-front, .tl-back {
  position: absolute; inset: 0; border-radius: 8px;
  backface-visibility: hidden; -webkit-backface-visibility: hidden;
}
.tl-front {
  background: var(--surface-card);
  border: 1px solid var(--border-subtle);
  padding: 8px 12px;
  transition: background var(--dur-fast), border-color var(--dur-fast);
}
.timeline-event.current .tl-front {
  background: var(--surface-hover);
  border-color: rgba(255,255,255,.2);
}
.tl-back {
  background: var(--surface-card);
  border: 1px solid var(--border-subtle);
  transform: rotateY(180deg);
  display: flex; align-items: center; justify-content: center;
}
.tl-back-mark {
  width: 28px; height: 28px; border-radius: 50%;
  border: 1px solid var(--border-default); opacity: .3;
}
.timeline-num { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
.tl-dot {
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--surface-hover);
  border: 1px solid var(--border-default);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 700; color: var(--text-secondary); flex-shrink: 0;
}
.tl-dot.current-dot { background: var(--text-primary); color: var(--surface-bg); border-color: transparent; }
.timeline-year { font-size: 10px; color: var(--text-muted); }
.timeline-title { font-size: 11px; font-weight: 600; color: var(--text-primary); line-height: 1.35; margin-bottom: 4px; }
.timeline-desc { font-size: 10px; color: var(--text-secondary); line-height: 1.55; }

/* ── Main grid ── */
#main { flex: 1; overflow: hidden; }
#cluster-grid {
  height: 100%;
  display: grid; grid-template-columns: repeat(3,1fr);
  gap: 16px; padding: 16px 24px;
  overflow-y: auto; align-content: start;
}

/* ── Family card ── */
.family-card {
  background: var(--surface-card);
  border: 1px solid var(--border-subtle);
  border-left-width: 4px;
  border-radius: 10px; overflow: hidden;
}
.family-card-header {
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--border-subtle);
}
.family-card-header h2 {
  font-size: 15px; font-weight: 700;
  letter-spacing: -.01em;
  color: var(--text-primary);
  line-height: 1.2;
}

/* ── Character rows ── */
.char-list { padding: 10px 16px 14px; display: flex; flex-direction: column; gap: 8px; }

.char-row { display: flex; flex-direction: column; gap: 2px; }

.char-name {
  font-size: 11px; color: var(--text-secondary);
  line-height: 1.4;
}
.char-name.primary {
  font-size: 13px; font-weight: 600;
  color: var(--text-primary);
}
.char-role {
  font-size: 10px; color: var(--text-muted);
  line-height: 1.4; letter-spacing: .01em;
}

/* ── Responsive ── */
@media (max-width: 700px) {
  #cluster-grid { grid-template-columns: 1fr; padding: 12px; gap: 12px; }
  #header-top { padding: 12px 16px; }
  #chapter-strip { padding: 10px 16px 12px; }
  #timeline-header { padding: 8px 16px 4px; }
  #timeline-scroll { padding: 0 16px 10px; }
}
@media (min-width: 701px) and (max-width: 1100px) {
  #cluster-grid { grid-template-columns: repeat(2,1fr); }
}
</style>
</head>
<body>

<div id="header">
  <div id="header-top">
    <h1>My Brilliant Friend &mdash; <span>Character Relationships</span></h1>
  </div>
  <div id="chapter-strip">
    <div id="chapter-strip-label">
      <span id="chapter-label-text">Chapter</span>
      <span id="chapter-val">1</span>
      <span id="chapter-val-suffix">of 87 —</span>
      <span id="chapter-era">Childhood in Rione</span>
    </div>
    <input type="range" id="chapter-slider" min="1" max="87" value="1">
    <div id="chapter-ticks">
      <span>1</span><span>10</span><span>20</span><span>30</span><span>40</span>
      <span>50</span><span>60</span><span>70</span><span>87</span>
    </div>
  </div>
  <div id="timeline-bar">
    <div id="timeline-header">
      <span id="timeline-header-label">Timeline of Key Events</span>
    </div>
    <div id="timeline-scroll"></div>
  </div>
</div>

<div id="main">
  <div id="cluster-grid"></div>
</div>

<script>
const FAMILIES = [
  {
    id:'greco', name:'Greco Family', color:'var(--cluster-greco)',
    members:[
      { name:'Elena "Lenù" Greco', primary:true, role:'Protagonist & narrator' },
      { name:'Mr. Greco',                         role:'City hall porter' },
      { name:'Mrs. Greco',                        role:'Strict mother, resents Elena\'s ambitions' },
      { name:'Peppe',                             role:'Younger sibling' },
      { name:'Gianni',                            role:'Younger sibling' },
      { name:'Elisa',                             role:'Younger sibling, later linked to Solaras' },
    ]
  },
  {
    id:'cerullo', name:'Cerullo Family', color:'var(--cluster-cerullo)',
    members:[
      { name:'Raffaella "Lila" Cerullo', primary:true, role:'Elena\'s best friend, fiercely brilliant' },
      { name:'Fernando Cerullo',                       role:'Shoemaker, strict and volatile father' },
      { name:'Nunzia Cerullo',                         role:'Lila\'s mother' },
      { name:'Rino Cerullo (Elder)', primary:true,     role:'Older brother, Lila\'s shoe collaborator' },
      { name:'Rino (Younger)',                         role:'Lila\'s son, named after her brother' },
    ]
  },
  {
    id:'carracci', name:'Carracci Family', color:'var(--cluster-carracci)',
    members:[
      { name:'Don Achille †',                      role:'Feared loan shark, murdered in childhood' },
      { name:'Donna Maria',                         role:'Don Achille\'s wife' },
      { name:'Stefano Carracci', primary:true,      role:'Grocer, marries Lila at sixteen' },
      { name:'Alfonso Carracci', primary:true,      role:'Sweet, intelligent classmate' },
      { name:'Pinuccia',                            role:'Stefano\'s sister' },
    ]
  },
  {
    id:'peluso', name:'Peluso Family', color:'var(--cluster-peluso)',
    members:[
      { name:'Alfredo',                             role:'Carpenter ruined by Don Achille' },
      { name:'Giuseppina',                          role:'Alfredo\'s wife' },
      { name:'Pasquale Peluso', primary:true,       role:'Communist labourer, loves Lila' },
      { name:'Carmela (Carmen) Peluso', primary:true, role:'Close friend to Elena & Lila' },
    ]
  },
  {
    id:'sarratore', name:'Sarratore Family', color:'var(--cluster-sarratore)',
    members:[
      { name:'Donato Sarratore', primary:true,  role:'Railroad worker, poet, serial womaniser' },
      { name:'Lidia',                            role:'Donato\'s long-suffering wife' },
      { name:'Nino Sarratore', primary:true,    role:'Elena\'s lifelong obsession' },
      { name:'Marisa Sarratore', primary:true,  role:'Nino\'s sister, befriended by Elena' },
      { name:'Pino',                             role:'Younger sibling' },
      { name:'Clelia',                           role:'Younger sibling' },
      { name:'Ciro',                             role:'Youngest sibling' },
    ]
  },
  {
    id:'cappuccio', name:'Cappuccio Family', color:'var(--cluster-cappuccio)',
    members:[
      { name:'Melina Cappuccio', primary:true,   role:'Unstable widow, Donato\'s former lover' },
      { name:'Antonio Cappuccio', primary:true,  role:'Mechanic, Elena\'s teenage boyfriend' },
      { name:'Ada',                              role:'Antonio\'s sister' },
    ]
  },
  {
    id:'solara', name:'Solara Family', color:'var(--cluster-solara)',
    members:[
      { name:'Silvio Solara',                    role:'Violent bar owner, Camorra-linked' },
      { name:'Manuela Solara',                   role:'Manages the family\'s debt book' },
      { name:'Marcello Solara', primary:true,    role:'Pursues Lila obsessively' },
      { name:'Michele Solara', primary:true,     role:'Colder, more calculating brother' },
    ]
  },
  {
    id:'scanno', name:'Scanno Family', color:'var(--cluster-scanno)',
    members:[
      { name:'Nicola',                           role:'Fruit & vegetable seller' },
      { name:'Assunta',                          role:'Nicola\'s wife' },
      { name:'Enzo Scanno', primary:true,        role:'Classmate, steadfastly devoted to Lila' },
    ]
  },
  {
    id:'spagnuolo', name:'Spagnuolo Family', color:'var(--cluster-spagnuolo)',
    members:[
      { name:'Signor Spagnuolo',                 role:'Pastry maker at Bar Solara' },
      { name:'Rosa',                             role:'His wife' },
      { name:'Gigliola Spagnuolo', primary:true, role:'Classmate, dates Michele Solara' },
    ]
  },
  {
    id:'other', name:'Other Key Characters', color:'var(--cluster-other)',
    members:[
      { name:'Maestra Oliviero', primary:true,   role:'Teacher who fights for Elena\'s education' },
      { name:'Maestro Ferraro',                  role:'Teacher & neighbourhood librarian' },
      { name:'Gino', primary:true,               role:'Elena\'s first boyfriend' },
      { name:'Nella Incardo',                    role:'Hosts Elena on Ischia' },
      { name:'Prof. Gerace',                     role:'High school teacher' },
      { name:'Prof. Galiani',                    role:'Intellectual mentor to Elena' },
      { name:'Pietro Airota',                    role:'Elena\'s future husband' },
    ]
  },
];

const TIMELINE = [
  {num:1, year:'1944–45', chapter:1,  title:'Childhood in Rione',       desc:'Elena and Lila meet as little girls in the postwar years in the poor neighbourhood of Naples.'},
  {num:2, year:'1947–48', chapter:5,  title:'Elementary School',         desc:'They begin school with Maestra Oliviero who recognises their extraordinary intelligence.'},
  {num:3, year:'1949',    chapter:15, title:"Don Achille's Murder",       desc:'Don Achille Carracci, the neighbourhood "ogre", is murdered. Alfredo Peluso is accused.'},
  {num:4, year:'1950',    chapter:25, title:'End of Elementary School',   desc:'Elena graduates top of class. Maestra Oliviero secures her middle school place — but Lila is denied.'},
  {num:5, year:'1950–51', chapter:35, title:'New Paths',                  desc:'Elena begins middle school far from the Rione. Lila stays behind, helping her father in the shoe shop.'},
  {num:6, year:'1951–52', chapter:45, title:'Adolescence & Awakening',    desc:"Elena's intense infatuation with Nino Sarratore deepens. She befriends Marisa to be near him."},
  {num:7, year:'1952',    chapter:55, title:'Teenage Romances',           desc:'Elena has a brief romance with Gino, then begins a relationship with Antonio Cappuccio.'},
  {num:8, year:'1952',    chapter:65, title:'Lila & the Solaras',         desc:'Marcello Solara pursues Lila aggressively for marriage, but she ultimately rejects him.'},
  {num:9, year:'1953',    chapter:75, title:'Summer on Ischia',           desc:'Elena spends the summer on Ischia — a rare freedom, and the threshold of young adulthood.'},
  {num:10,year:'1952–53', chapter:87, title:'Lila Marries Stefano',       desc:'At sixteen, Lila marries Stefano Carracci and enters a life of wealth — but also confinement.'},
];

const ERAS = [
  {max:10, label:'Childhood in Rione'},
  {max:25, label:'Elementary School Years'},
  {max:40, label:'Diverging Paths'},
  {max:55, label:'Adolescence & Awakening'},
  {max:70, label:'Teenage Romances'},
  {max:80, label:'Lila & the Solaras'},
  {max:87, label:'The Wedding'},
];

let currentChapter = 1;
function currentEra(){ return (ERAS.find(e=>currentChapter<=e.max)||ERAS[ERAS.length-1]).label; }

function renderCards(){
  const grid = document.getElementById('cluster-grid');
  grid.innerHTML = '';
  FAMILIES.forEach(family=>{
    const card = document.createElement('div');
    card.className = 'family-card';
    card.style.borderLeftColor = family.color;

    const header = document.createElement('div');
    header.className = 'family-card-header';
    header.innerHTML = `<h2>${family.name}</h2>`;
    card.appendChild(header);

    const list = document.createElement('div');
    list.className = 'char-list';
    family.members.forEach(m=>{
      const row = document.createElement('div');
      row.className = 'char-row';
      row.innerHTML = `<span class="char-name${m.primary?' primary':''}">${m.name}</span>`
        + (m.role ? `<span class="char-role">${m.role}</span>` : '');
      list.appendChild(row);
    });
    card.appendChild(list);
    grid.appendChild(card);
  });
}

const slider = document.getElementById('chapter-slider');
function updateSlider(){
  const pct = ((slider.value-slider.min)/(slider.max-slider.min))*100;
  slider.style.setProperty('--pct', pct);
  document.getElementById('chapter-val').textContent = slider.value;
  document.getElementById('chapter-era').textContent = currentEra();
  renderTimeline();
}
slider.addEventListener('input',()=>{ currentChapter=parseInt(slider.value,10); updateSlider(); });

function renderTimeline(){
  const scroll = document.getElementById('timeline-scroll');
  scroll.innerHTML = '';
  TIMELINE.forEach((ev,idx)=>{
    const isFuture  = ev.chapter > currentChapter;
    const isCurrent = !isFuture && (idx===TIMELINE.length-1 || TIMELINE[idx+1].chapter>currentChapter);
    const div = document.createElement('div');
    div.className = 'timeline-event'+(isFuture?' future':'')+(isCurrent?' current':'');
    div.innerHTML = `
      <div class="tl-inner">
        <div class="tl-front">
          <div class="timeline-num">
            <div class="tl-dot${isCurrent?' current-dot':''}">${ev.num}</div>
            <span class="timeline-year">${ev.year}</span>
          </div>
          <div class="timeline-title">${ev.title}</div>
          <div class="timeline-desc">${ev.desc}</div>
        </div>
        <div class="tl-back"><div class="tl-back-mark"></div></div>
      </div>`;
    scroll.appendChild(div);
  });
}

renderCards();
updateSlider();
</script>
</body>
</html>
