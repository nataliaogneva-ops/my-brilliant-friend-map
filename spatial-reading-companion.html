<style>
:root {
  /* ── Family identity colors (categorical) ── */
  --cluster-greco:     #1A3A5C;
  --cluster-cerullo:   #6B1F7A;
  --cluster-carracci:  #B5411C;
  --cluster-peluso:    #1E5C30;
  --cluster-sarratore: #7A5A0A;
  --cluster-cappuccio: #0F5470;
  --cluster-solara:    #9E1F23;
  --cluster-scanno:    #2A5C40;
  --cluster-spagnuolo: #5A2A5A;
  --cluster-other:     #3E3830;

  /* ── Reference DS — surface tokens ── */
  --surface-warm-white: #F0EDE6;
  --surface-sage:       #C8CFBF;
  --surface-powder:     #C4D4E3;
  --surface-slate:      #8A9A9A;
  --surface-dark:       #1A1A1A;

  /* Aliases */
  --surface-bg:    var(--surface-warm-white);
  --surface-panel: var(--surface-sage);
  --surface-card:  var(--surface-warm-white);

  /* ── Text ── */
  --text-primary:   #1A1A1A;
  --text-secondary: #595959;
  --text-tertiary:  #8A8A8A;
  --text-muted:     rgba(26,26,26,0.38);
  --text-inverse:   #F0EDE6;

  /* ── Accent — one per screen ── */
  --accent: #E85D22;

  /* ── Typography ── */
  --font-sans: "Helvetica Neue", Arial, sans-serif;
  --font-mono: "Space Mono", monospace;

  /* ── Border radius ── */
  --radius-none: 0px;
  --radius-sm:   4px;
  --radius-md:   8px;
  --radius-lg:   12px;
  --radius-xl:   16px;

  /* ── Motion ── */
  --ease-out:    ease-out;
  --ease-in-out: ease-in-out;
  --dur-fast:   150ms;
  --dur-normal: 200ms;
}

*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-sans);
  background: var(--surface-bg);
  color: var(--text-primary);
  height: 100dvh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── Header — dark inversion ── */
#header {
  flex-shrink: 0;
  background: var(--surface-dark);
  z-index: 20;
}
#header-top { padding: 14px 24px; }
#header h1 {
  font-family: var(--font-mono);
  font-size: 12px; font-weight: 400;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: rgba(240,237,230,0.45);
}
#header h1 span { color: var(--text-inverse); }

/* ── Main scroll container ── */
#main { flex: 1; overflow-y: auto; }

/* ── Chapter strip ── */
#chapter-strip {
  padding: 20px 24px 16px;
  background: var(--surface-sage);
  position: sticky; top: 0; z-index: 10;
  border-bottom: 1px solid rgba(26,26,26,0.15);
}
#chapter-strip-label {
  display: flex; align-items: baseline; gap: 16px;
  margin-bottom: 16px; flex-wrap: wrap;
}
#chapter-label-text {
  font-family: var(--font-mono);
  font-size: 12px; font-weight: 400;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-tertiary);
  padding-bottom: 6px;
}
/* Chapter number — text-h1 scale, typographic duality */
#chapter-val {
  font-family: var(--font-sans);
  font-size: 64px; font-weight: 700;
  letter-spacing: -0.03em;
  color: var(--accent);
  line-height: 1.0; min-width: 2ch;
}
#chapter-val-suffix {
  font-family: var(--font-mono);
  font-size: 12px; font-weight: 400;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-tertiary);
  padding-bottom: 6px;
}
/* Era name — small mono, subordinate to display number */
#chapter-era {
  font-family: var(--font-mono);
  font-size: 13px; font-weight: 400;
  letter-spacing: 0.05em;
  color: var(--text-secondary);
  padding-bottom: 6px;
  text-transform: uppercase;
}

/* ── Slider arrow hints overlaid on the thumb ── */
#slider-wrap {
  position: relative;
  height: 24px;
  display: flex; align-items: center;
}
/* Arrow overlay sits exactly on top of the orange thumb */
#thumb-arrow {
  position: absolute;
  top: 50%;
  left: calc(var(--pct, 0) / 100 * (100% - 24px) + 12px);
  transform: translate(-50%, -50%);
  width: 24px; height: 24px;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
  font-size: 13px; font-weight: 700; line-height: 1;
  color: #fff;
  z-index: 2;
  letter-spacing: -0.04em;
}
@keyframes arrowBlink {
  0%, 100% { opacity: 0.3; }
  50%       { opacity: 1; }
}
#thumb-arrow.pulse { animation: arrowBlink 2s ease-in-out infinite; }

/* ── Slider ── */
#chapter-slider {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 2px;
  background: linear-gradient(
    to right,
    var(--accent) 0%,
    var(--accent) calc(var(--pct, 0) * 1%),
    rgba(26,26,26,0.25) calc(var(--pct, 0) * 1%),
    rgba(26,26,26,0.25) 100%
  );
  outline: none; cursor: pointer;
  border-radius: var(--radius-none);
}
#chapter-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 24px; height: 24px; border-radius: var(--radius-none);
  background: var(--accent);
  border: none;
  transition: transform var(--dur-fast) var(--ease-out);
}
@media (hover: hover) and (pointer: fine) {
  #chapter-slider:hover::-webkit-slider-thumb { transform: scale(1.08); }
}
#chapter-slider:active::-webkit-slider-thumb { transform: scale(0.92); }
#chapter-slider:focus-visible { outline: 2px solid var(--accent); outline-offset: 6px; }

/* Tick marks — instrument panel style */
#chapter-ticks {
  display: flex; justify-content: space-between;
  margin-top: 6px; padding: 0 1px;
}
.tick { display: flex; flex-direction: column; align-items: center; gap: 3px; }
.tick-line {
  width: 1px; height: 5px;
  background: rgba(26,26,26,0.3);
}
.tick-label {
  font-family: var(--font-mono);
  font-size: 12px; text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-tertiary);
}

/* ── Timeline ── */
#timeline-bar {
  background: var(--surface-warm-white);
  border-bottom: 1px solid rgba(26,26,26,0.12);
}
#timeline-header { padding: 20px 24px 8px; }
#timeline-header-label {
  font-family: var(--font-mono);
  font-size: 12px; font-weight: 400;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-tertiary);
}
#timeline-scroll-wrap { position: relative; }
#timeline-scroll-wrap::after {
  content: '';
  position: absolute; top: 0; right: 0; bottom: 0; width: 56px;
  background: linear-gradient(to right, transparent, var(--surface-warm-white));
  pointer-events: none;
}
#timeline-scroll {
  display: flex; gap: 20px;
  padding: 12px 24px 20px;
  overflow-x: auto; scrollbar-width: none;
}
#timeline-scroll::-webkit-scrollbar { display: none; }

.timeline-event {
  flex-shrink: 0; width: 188px; height: 210px;
  perspective: 700px;
  border: 1px solid rgba(26,26,26,0.2);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.tl-inner {
  position: relative; width: 100%; height: 100%;
  transform-style: preserve-3d;
  transition: transform 380ms var(--ease-in-out);
}
.timeline-event.future .tl-inner { transform: rotateY(180deg); }
.tl-front, .tl-back {
  position: absolute; inset: 0;
  border-radius: var(--radius-lg);
  backface-visibility: hidden; -webkit-backface-visibility: hidden;
}
.tl-front {
  background: var(--surface-warm-white);
  padding: 14px 16px;
}
/* Active cell — accent block, inverted text */
.timeline-event.current .tl-front {
  background: var(--accent);
}
.timeline-event.current .timeline-year,
.timeline-event.current .timeline-title,
.timeline-event.current .timeline-desc { color: var(--text-inverse); }
.timeline-event.current .tl-dot { background: var(--text-inverse); color: var(--accent); }
.tl-back {
  background: var(--surface-sage);
  transform: rotateY(180deg);
  display: flex; align-items: center; justify-content: center;
}
.tl-back-mark {
  font-family: var(--font-mono);
  font-size: 12px; font-weight: 400;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-tertiary);
  writing-mode: vertical-rl;
  transform: rotate(180deg);
}
.timeline-num { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
/* Archival index number */
.tl-dot {
  width: 18px; height: 18px;
  border-radius: var(--radius-none);
  background: var(--surface-sage);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono);
  font-size: 11px; font-weight: 700; color: var(--text-secondary); flex-shrink: 0;
}
.tl-dot.current-dot { background: var(--text-inverse); color: var(--accent); }
.timeline-year {
  font-family: var(--font-mono);
  font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--text-tertiary);
}
.timeline-title {
  font-family: var(--font-sans);
  font-size: 15px; font-weight: 700;
  color: var(--text-primary); line-height: 1.3; margin-bottom: 5px;
}
.timeline-desc {
  font-family: var(--font-sans);
  font-size: 14px;
  color: var(--text-secondary); line-height: 1.5;
}

/* ── Main grid ── */
#cluster-grid {
  columns: 3; column-gap: 20px;
  padding: 28px 24px 64px;
}

/* ── Family card — archival grid cell ── */
.family-card {
  background: var(--surface-warm-white);
  border-radius: var(--radius-lg);
  border: 1px solid rgba(26,26,26,0.2);
  overflow: hidden;
  break-inside: avoid;
  margin-bottom: 20px;
}
#cluster-grid { margin-left: 0; margin-top: 0; }

.family-card-header {
  padding: 16px 18px 12px;
  background: var(--surface-sage);
  border-bottom: 1px solid rgba(26,26,26,0.15);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
}
.family-summary {
  display: block;
  font-family: var(--font-mono);
  font-size: 12px; font-weight: 400;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-tertiary);
  margin-top: 5px;
}

/* Revealed character detail — accent, own line below name+role */
.char-reveal {
  flex-basis: 100%; /* break to new line within the flex row */
  display: block;
  font-family: var(--font-mono);
  font-size: 12px; font-weight: 400;
  color: var(--accent);
  line-height: 1.5;
  margin-top: 2px;
  letter-spacing: 0.02em;
  opacity: 0;
  transition: opacity 500ms ease;
}
.char-reveal.visible { opacity: 1; }

.family-card-header h2 { line-height: 1; }
.family-surname {
  display: block;
  font-family: var(--font-sans);
  font-size: 22px; font-weight: 700;
  letter-spacing: 0.04em; text-transform: uppercase;
  color: var(--family-color, var(--text-primary));
  line-height: 1.1;
}

/* ── Character list — data-row pattern ── */
.char-list {
  padding: 0;
  display: flex; flex-direction: column;
  background: var(--surface-warm-white);
}
/* Data rows: thin border separators, name + role inline */
.char-row {
  display: flex; align-items: baseline; flex-wrap: wrap; gap: 0 8px;
  background: transparent;
  border-bottom: 1px solid rgba(26,26,26,0.1);
  padding: 11px 18px;
}
.char-row:last-child { border-bottom: none; }

/* Name row wraps together with dot */
.char-name-row {
  display: contents; /* let dot + name sit inline with role */
}
/* Family color dot — square mark */
.char-dot {
  width: 7px; height: 7px; flex-shrink: 0;
  border-radius: var(--radius-none);
  background: var(--family-color, var(--text-secondary));
  align-self: center;
  margin-right: 2px;
}
.char-name {
  font-family: var(--font-sans);
  font-size: 15px; font-weight: 400;
  color: var(--text-secondary); line-height: 1.4;
}
.char-name.primary {
  font-weight: 700;
  color: var(--text-primary);
}
/* Role — inline after name, separated by em-dash via ::before */
.char-role {
  font-family: var(--font-mono);
  font-size: 12px; font-weight: 400;
  letter-spacing: 0.04em; text-transform: uppercase;
  color: var(--text-tertiary); line-height: 1.4;
}
.char-role::before {
  content: "— ";
  color: var(--text-muted);
  font-style: normal;
}

/* ── Chapter number update pulse ── */
@keyframes chapterPop {
  0%   { opacity: 1;   transform: scale(1); }
  35%  { opacity: 0.4; transform: scale(0.96); }
  100% { opacity: 1;   transform: scale(1); }
}
#chapter-val.updating {
  animation: chapterPop var(--dur-normal) var(--ease-out);
}

/* ── Responsive ── */
@media (max-width: 700px) {
  #header-top { padding: 12px 16px; }
  #chapter-strip { padding: 14px 16px 12px; position: static; }
  #chapter-val { font-size: 48px; }
  #timeline-header { padding: 14px 16px 6px; }
  #timeline-scroll { padding: 8px 16px 16px; }
  #cluster-grid { columns: 1; padding: 16px 16px 48px; margin-left: 0; margin-top: 0; }
  .family-card { margin-bottom: 16px; }
}
@media (min-width: 701px) and (max-width: 1100px) {
  #cluster-grid { columns: 2; }
}
</style>
</head>

  <div id="header-top">

</div>

const TIMELINE = [
  {num:1, year:'1944–45', chapter:1,  title:'Childhood in Rione',       desc:'Elena and Lila meet as little girls in the postwar years in the poor neighbourhood of Naples.'},
  {num:2, year:'1947–48', chapter:5,  title:'Elementary School',         desc:'They begin school with Maestra Oliviero who recognises their extraordinary intelligence.'},
  {num:3, year:'1949',    chapter:15, title:"Don Achille's Murder",       desc:'Don Achille Carracci, the neighbourhood "ogre", is murdered. Alfredo Peluso is accused.'},
  {num:4, year:'1950',    chapter:25, title:'End of Elementary School',   desc:'Elena graduates top of class. Maestra Oliviero secures her middle school place — but Lila is denied.'},
  {num:5, year:'1950–51', chapter:35, title:'New Paths',                  desc:'Elena begins middle school far from the Rione. Lila stays behind, helping her father in the shoe shop.'},
  {num:6, year:'1951–52', chapter:45, title:'Adolescence & Awakening',    desc:"Elena's intense infatuation with Nino Sarratore deepens. She befriends Marisa to be near him."},
  {num:7, year:'1952',    chapter:55, title:'Teenage Romances',           desc:'Elena has a brief romance with Gino, then begins a relationship with Antonio Cappuccio.'},
  {num:8, year:'1952',    chapter:65, title:'Lila & the Solaras',         desc:'Marcello Solara pursues Lila aggressively for marriage, but she ultimately rejects him.'},
  {num:9, year:'1953',    chapter:75, title:'Summer on Ischia',           desc:'Elena spends the summer on Ischia — a rare freedom, and the threshold of young adulthood.'},
  {num:10,year:'1952–53', chapter:87, title:'Lila Marries Stefano',       desc:'At sixteen, Lila marries Stefano Carracci and enters a life of wealth — but also confinement.'},
];

const ERAS = [
  {max:10, label:'Childhood in Rione'},
  {max:25, label:'Elementary School Years'},
  {max:40, label:'Diverging Paths'},
  {max:55, label:'Adolescence & Awakening'},
  {max:70, label:'Teenage Romances'},
  {max:80, label:'Lila & the Solaras'},
  {max:87, label:'The Wedding'},
];

let currentChapter = 1;
function currentEra(){ return (ERAS.find(e=>currentChapter<=e.max)||ERAS[ERAS.length-1]).label; }

function renderCards(animate){
  const grid = document.getElementById('cluster-grid');
  let visibleIdx = 0;
  FAMILIES.forEach((family)=>{
    const familyKey = family.name.replace(/\s+/g,'-');
    const isVisible = (family.firstChapter || 1) <= currentChapter;
    let card = grid.querySelector(`[data-family="${familyKey}"]`);

    if (!isVisible){ if(card) card.remove(); return; }

    if (!card){
      card = document.createElement('div');
      card.className = 'family-card';
      card.dataset.family = familyKey;
      card.style.setProperty('--family-color', family.color);
      const nameParts = family.name.split(' ');
      const surname = nameParts.slice(0, -1).join(' ');
      const header = document.createElement('div');
      header.className = 'family-card-header';
      header.innerHTML = `<h2><span class="family-surname">${surname}</span></h2>`
        + (family.summary ? `<span class="family-summary">${family.summary}</span>` : '');
      card.appendChild(header);
      card.appendChild(document.createElement('div')).className = 'char-list';
      grid.appendChild(card);
    }
    card.style.setProperty('--card-index', visibleIdx++);

    const list = card.querySelector('.char-list');
    family.members.forEach(m=>{
      const memberKey = m.name.replace(/[^a-zA-Z0-9]/g,'-');
      const memberVisible = (m.firstChapter || 1) <= currentChapter;
      let row = list.querySelector(`[data-member="${memberKey}"]`);

      if (!memberVisible){ if(row) row.remove(); return; }

      if (!row){
        row = document.createElement('div');
        row.className = 'char-row';
        row.dataset.member = memberKey;
        const dot = m.primary ? `<span class="char-dot"></span>` : '';
        row.innerHTML = `<div class="char-name-row">${dot}<span class="char-name${m.primary?' primary':''}">${m.name}</span></div>`
          + (m.role ? `<span class="char-role">${m.role}</span>` : '');
        list.appendChild(row);
      }

      (m.reveals || []).filter(r => r.chapter <= currentChapter).forEach(r=>{
        const revealKey = `reveal-${memberKey}-${r.chapter}`;
        if (!row.querySelector(`[data-reveal="${revealKey}"]`)){
          const span = document.createElement('span');
          span.className = 'char-reveal';
          span.dataset.reveal = revealKey;
          span.textContent = r.text;
          row.appendChild(span);
          if (animate){
            requestAnimationFrame(()=> requestAnimationFrame(()=> span.classList.add('visible')));
          } else {
            span.classList.add('visible');
          }
        }
      });
    });
  });
}

const slider     = document.getElementById('chapter-slider');
const sliderWrap = document.getElementById('slider-wrap');
const thumbArrow = document.getElementById('thumb-arrow');

function updateArrows(){
  const ch = parseInt(slider.value);
  const isFirst = ch === parseInt(slider.min);
  const isLast  = ch === parseInt(slider.max);
  if (isFirst) {
    thumbArrow.textContent = '→';
    thumbArrow.classList.add('pulse');
  } else if (isLast) {
    thumbArrow.textContent = '←';
    thumbArrow.classList.remove('pulse');
  } else {
    thumbArrow.textContent = '↔';
    thumbArrow.classList.remove('pulse');
  }
}

function updateSlider(){
  const pct = ((slider.value-slider.min)/(slider.max-slider.min))*100;
  sliderWrap.style.setProperty('--pct', pct);
  const valEl = document.getElementById('chapter-val');
  valEl.textContent = String(slider.value).padStart(2,'0');
  valEl.classList.remove('updating');
  void valEl.offsetWidth; // force reflow to restart animation
  valEl.classList.add('updating');
  document.getElementById('chapter-era').textContent = currentEra();
  updateArrows();
  renderTimeline();
  renderCards(true);
}
slider.addEventListener('input',()=>{
  currentChapter=parseInt(slider.value,10);
  updateSlider();
  if(window.posthog){
    posthog.capture('slider_moved',{chapter:currentChapter});
    if(currentChapter===parseInt(slider.max,10)) posthog.capture('explored_full_book');
  }
});

function renderTimeline(){
  const scroll = document.getElementById('timeline-scroll');
  scroll.innerHTML = '';
  TIMELINE.forEach((ev,idx)=>{
    const isFuture  = ev.chapter > currentChapter;
    const isCurrent = !isFuture && (idx===TIMELINE.length-1 || TIMELINE[idx+1].chapter>currentChapter);
    const div = document.createElement('div');
    div.className = 'timeline-event'+(isFuture?' future':'')+(isCurrent?' current':'');
    div.innerHTML = `
      <div class="tl-inner">
        <div class="tl-front">
          <div class="timeline-num">
            <div class="tl-dot${isCurrent?' current-dot':''}">${ev.num}</div>
            <span class="timeline-year">${ev.year}</span>
          </div>
          <div class="timeline-title">${ev.title}</div>
          <div class="timeline-desc">${ev.desc}</div>
        </div>
        <div class="tl-back"><div class="tl-back-mark"></div></div>
      </div>`;
    scroll.appendChild(div);
  });
}

renderCards(false);
updateSlider();
</script>
