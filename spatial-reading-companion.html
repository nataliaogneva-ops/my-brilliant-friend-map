<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Brilliant Friend — Character Relationships</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* ============================================================  TOKENS  */
:root {
  --cluster-greco:     #1A3A5C;
  --cluster-cerullo:   #7B2D8B;
  --cluster-carracci:  #B5411C;
  --cluster-peluso:    #2E6B3E;
  --cluster-sarratore: #8B6914;
  --cluster-cappuccio: #1D6B8A;
  --cluster-solara:    #A0272B;
  --cluster-scanno:    #3D6B4F;
  --cluster-spagnuolo: #6B3A6B;
  --cluster-other:     #3A3A4A;

  --rel-romance:    #E8527A;
  --rel-friendship: #52B788;
  --rel-alliance:   #4A90D9;
  --rel-mentorship: #9B8AC4;
  --rel-conflict:   #8B949E;
  --rel-family:     #5A8FBF;

  --surface-bg:     #0D1117;
  --surface-panel:  #161B22;
  --surface-card:   #1C2431;
  --surface-hover:  #252D3A;

  --text-primary:   #E6EDF3;
  --text-secondary: #8B949E;
  --text-muted:     #484F58;

  --border-subtle:  rgba(255,255,255,0.07);
  --border-default: rgba(255,255,255,0.13);

  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --dur-fast: 140ms;
  --dur-med:  260ms;

  --sp-4:4px; --sp-6:6px; --sp-8:8px; --sp-12:12px;
  --sp-16:16px; --sp-24:24px; --sp-32:32px;
}

/* ============================================================  BASE  */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--surface-bg);color:var(--text-primary);
  height:100dvh;overflow:hidden;display:flex;flex-direction:column;
}

/* ============================================================  HEADER  */
#header{
  flex-shrink:0;background:var(--surface-panel);
  border-bottom:1px solid var(--border-subtle);z-index:20;
}
#header-top{
  display:flex;align-items:center;gap:var(--sp-24);
  padding:var(--sp-12) var(--sp-24);flex-wrap:wrap;
}
#header h1{
  font-size:13px;font-weight:600;letter-spacing:.08em;
  text-transform:uppercase;color:var(--text-secondary);white-space:nowrap;
}
#header h1 span{color:var(--text-primary)}

/* filters */
#filters{display:flex;gap:var(--sp-6);flex-wrap:wrap}
.filter-pill{
  display:flex;align-items:center;gap:3px;padding:3px var(--sp-12);
  border-radius:999px;border:1.5px solid transparent;font-size:11px;
  font-weight:600;letter-spacing:.05em;cursor:pointer;
  transition:background var(--dur-fast);user-select:none;
  background:var(--surface-card);
}
.filter-pill[data-rel="romance"]    {border-color:var(--rel-romance);   color:var(--rel-romance)}
.filter-pill[data-rel="friendship"] {border-color:var(--rel-friendship);color:var(--rel-friendship)}
.filter-pill[data-rel="alliance"]   {border-color:var(--rel-alliance);  color:var(--rel-alliance)}
.filter-pill[data-rel="mentorship"] {border-color:var(--rel-mentorship);color:var(--rel-mentorship)}
.filter-pill[data-rel="conflict"]   {border-color:var(--rel-conflict);  color:var(--rel-conflict)}
.filter-pill[data-rel="family"]     {border-color:var(--rel-family);    color:var(--rel-family)}
.filter-pill.active[data-rel="romance"]    {background:var(--rel-romance);   color:#fff}
.filter-pill.active[data-rel="friendship"] {background:var(--rel-friendship);color:#fff}
.filter-pill.active[data-rel="alliance"]   {background:var(--rel-alliance);  color:#fff}
.filter-pill.active[data-rel="mentorship"] {background:var(--rel-mentorship);color:#fff}
.filter-pill.active[data-rel="conflict"]   {background:var(--rel-conflict);  color:#fff}
.filter-pill.active[data-rel="family"]     {background:var(--rel-family);    color:#fff}

/* chapter strip */
#chapter-strip{
  padding:var(--sp-8) var(--sp-24) var(--sp-12);
  border-top:1px solid var(--border-subtle);background:var(--surface-bg);
}
#chapter-strip-label{display:flex;align-items:baseline;gap:var(--sp-8);margin-bottom:var(--sp-6)}
#chapter-strip-label>span:first-child{
  font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted)
}
#chapter-val{font-size:20px;font-weight:700;color:var(--text-primary);line-height:1;min-width:32px}
#chapter-era{font-size:12px;color:var(--text-secondary);font-style:italic}
#chapter-val-suffix{font-size:12px;color:var(--text-muted)}
#chapter-slider{
  -webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:3px;
  background:linear-gradient(to right,var(--text-primary) 0%,
    var(--text-primary) calc(var(--pct,100%) * 1%),
    var(--surface-hover) calc(var(--pct,100%) * 1%),var(--surface-hover) 100%);
  outline:none;cursor:pointer;
}
#chapter-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:22px;height:22px;border-radius:50%;
  background:var(--text-primary);border:3px solid var(--surface-bg);
  box-shadow:0 0 0 2px rgba(255,255,255,.2),0 2px 8px rgba(0,0,0,.5);
  transition:transform var(--dur-fast);
}
#chapter-slider:active::-webkit-slider-thumb{transform:scale(1.2)}
#chapter-ticks{display:flex;justify-content:space-between;margin-top:4px;padding:0 2px}
#chapter-ticks span{font-size:10px;color:var(--text-muted)}

/* ============================================================  TIMELINE STRIP (in header)  */
#timeline-bar{
  border-top:1px solid var(--border-subtle);
  background:var(--surface-panel);overflow:hidden;
}
#timeline-toggle{
  display:flex;align-items:center;gap:var(--sp-8);padding:var(--sp-6) var(--sp-24);
  cursor:pointer;font-size:11px;font-weight:700;letter-spacing:.08em;
  text-transform:uppercase;color:var(--text-muted);
  transition:color var(--dur-fast);user-select:none;
}
#timeline-toggle:hover{color:var(--text-secondary)}
#timeline-scroll{
  display:none;
  gap:var(--sp-12);padding:0 var(--sp-24) var(--sp-12);
  overflow-x:auto;scrollbar-width:thin;
}
#timeline-scroll::-webkit-scrollbar{height:4px}
#timeline-scroll::-webkit-scrollbar-track{background:transparent}
#timeline-scroll::-webkit-scrollbar-thumb{background:var(--border-default);border-radius:2px}
.timeline-event{
  flex-shrink:0;width:160px;background:var(--surface-card);
  border:1px solid var(--border-subtle);border-radius:8px;
  padding:var(--sp-8) var(--sp-12);
  transition:border-color var(--dur-fast),opacity var(--dur-med);
}
.timeline-event.future{opacity:.35}
.timeline-event.current{border-color:rgba(255,255,255,.25)}
.timeline-num{
  font-size:10px;font-weight:700;color:var(--text-muted);margin-bottom:2px;
  display:flex;align-items:center;gap:var(--sp-6);
}
.timeline-num .tl-dot{
  width:16px;height:16px;border-radius:50%;background:var(--surface-hover);
  border:1px solid var(--border-default);display:flex;align-items:center;
  justify-content:center;font-size:9px;font-weight:700;color:var(--text-secondary);
  flex-shrink:0;
}
.timeline-num .tl-dot.current-dot{
  background:var(--text-primary);color:var(--surface-bg);border-color:transparent;
}
.timeline-year{font-size:10px;color:var(--text-muted)}
.timeline-title{font-size:12px;font-weight:600;color:var(--text-primary);margin:3px 0 4px}
.timeline-desc{font-size:10px;color:var(--text-secondary);line-height:1.5}

/* ============================================================  MAIN  */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* ============================================================  RELATIONSHIP ROW  */
#rel-row{
  flex-shrink:0;padding:var(--sp-8) var(--sp-24);
  border-bottom:1px solid var(--border-subtle);
  background:var(--surface-bg);
  display:none;
  flex-wrap:wrap;gap:var(--sp-6);align-items:center;
}
#rel-row.visible{display:flex}
#rel-row-label{
  font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--text-muted);white-space:nowrap;margin-right:var(--sp-4);
}
.rel-conn-chip{
  display:flex;align-items:center;gap:5px;
  padding:4px 10px 4px 6px;border-radius:999px;
  border:1.5px solid transparent;cursor:pointer;
  background:var(--surface-card);
  transition:background var(--dur-fast),transform var(--dur-fast);
  font-size:11px;font-weight:600;
  user-select:none;
}
.rel-conn-chip:hover{background:var(--surface-hover);transform:translateY(-1px)}
.rel-conn-chip .chip-dot{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;
}
.rel-conn-chip .chip-name{color:var(--text-primary)}
.rel-conn-chip .chip-type{font-size:10px;font-weight:700;letter-spacing:.04em}
.rel-conn-chip[data-type="romance"]    {border-color:var(--rel-romance);   }
.rel-conn-chip[data-type="friendship"] {border-color:var(--rel-friendship);}
.rel-conn-chip[data-type="alliance"]   {border-color:var(--rel-alliance);  }
.rel-conn-chip[data-type="mentorship"] {border-color:var(--rel-mentorship);}
.rel-conn-chip[data-type="conflict"]   {border-color:var(--rel-conflict);  }
.rel-conn-chip[data-type="family"]     {border-color:var(--rel-family);    }
.rel-conn-chip[data-type="romance"]    .chip-type{color:var(--rel-romance)   }
.rel-conn-chip[data-type="friendship"] .chip-type{color:var(--rel-friendship)}
.rel-conn-chip[data-type="alliance"]   .chip-type{color:var(--rel-alliance)  }
.rel-conn-chip[data-type="mentorship"] .chip-type{color:var(--rel-mentorship)}
.rel-conn-chip[data-type="conflict"]   .chip-type{color:var(--rel-conflict)  }
.rel-conn-chip[data-type="family"]     .chip-type{color:var(--rel-family)    }
.rel-conn-chip[data-type="romance"]    .chip-dot{background:var(--rel-romance)   }
.rel-conn-chip[data-type="friendship"] .chip-dot{background:var(--rel-friendship)}
.rel-conn-chip[data-type="alliance"]   .chip-dot{background:var(--rel-alliance)  }
.rel-conn-chip[data-type="mentorship"] .chip-dot{background:var(--rel-mentorship)}
.rel-conn-chip[data-type="conflict"]   .chip-dot{background:var(--rel-conflict)  }
.rel-conn-chip[data-type="family"]     .chip-dot{background:var(--rel-family)    }
#rel-row-empty{font-size:11px;color:var(--text-muted);font-style:italic}

/* ============================================================  CLUSTER GRID  */
#cluster-grid{
  flex:1;display:grid;grid-template-columns:repeat(3,1fr);
  gap:var(--sp-16);padding:var(--sp-16) var(--sp-24);
  overflow-y:auto;align-content:start;
}

/* ============================================================  FAMILY CARD  */
.family-card{
  background:var(--surface-card);border:1px solid var(--border-subtle);
  border-radius:12px;padding:var(--sp-12) var(--sp-16);position:relative;
  transition:border-color var(--dur-fast);
}
.family-card-header{
  display:flex;align-items:flex-start;gap:var(--sp-8);margin-bottom:var(--sp-10);
}
.cluster-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:3px}
.family-card-header h2{
  font-size:12px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text-secondary)
}
.family-subtitle{font-size:10px;color:var(--text-muted);font-weight:400;letter-spacing:0;text-transform:none;margin-top:1px}

/* Parents row */
.family-parents{
  display:flex;align-items:center;gap:4px;
  padding:5px var(--sp-8);border-radius:6px;
  background:rgba(255,255,255,.03);margin-bottom:var(--sp-8);
  flex-wrap:wrap;
}
.parent-node{
  font-size:11px;color:var(--text-secondary);
  display:flex;align-items:center;gap:4px;
}
.parent-sep{font-size:10px;color:var(--text-muted);padding:0 2px}
.tree-branch{
  width:1px;height:10px;background:var(--border-default);
  margin:0 auto var(--sp-6);
}

/* Children list */
.children-list{display:flex;flex-direction:column;gap:3px}

/* ============================================================  CHARACTER NODE  */
.character-node{
  display:flex;align-items:center;gap:var(--sp-8);
  padding:6px var(--sp-8);border-radius:8px;cursor:pointer;
  transition:background var(--dur-fast),opacity var(--dur-med) var(--ease-out);
  border:1px solid transparent;-webkit-tap-highlight-color:transparent;
  min-height:44px;
}
.character-node:hover{background:var(--surface-hover)}
.character-node.selected{background:var(--surface-hover);border-color:var(--border-default)}
.character-node.faded{opacity:.15}

.char-avatar{
  width:28px;height:28px;border-radius:50%;display:flex;
  align-items:center;justify-content:center;font-size:10px;
  font-weight:700;flex-shrink:0;color:#fff;position:relative;
}
.char-avatar.protagonist{
  box-shadow:0 0 0 2px #fff,0 0 0 4px rgba(255,255,255,.3);
}
.char-avatar .key-star{
  position:absolute;top:-4px;right:-4px;font-size:9px;
  background:var(--surface-card);border-radius:50%;padding:1px;
  line-height:1;
}
.char-name{font-size:13px;font-weight:500;flex:1;min-width:0}
.char-role{font-size:10px;color:var(--text-secondary);line-height:1.3}

/* Inline relationship badges */
.rel-badges{display:flex;gap:3px;margin-left:auto;flex-shrink:0;padding-left:var(--sp-6)}
.rel-badge{
  font-size:9px;font-weight:700;letter-spacing:.03em;
  padding:2px 6px;border-radius:999px;color:#fff;white-space:nowrap;
}
.rel-badge[data-type="romance"]    {background:var(--rel-romance)}
.rel-badge[data-type="friendship"] {background:var(--rel-friendship)}
.rel-badge[data-type="alliance"]   {background:var(--rel-alliance)}
.rel-badge[data-type="mentorship"] {background:var(--rel-mentorship)}
.rel-badge[data-type="conflict"]   {background:var(--rel-conflict)}
.rel-badge[data-type="family"]     {background:var(--rel-family)}

/* Collapsed toggle */
.collapsed-toggle{
  display:flex;align-items:center;gap:var(--sp-8);padding:5px var(--sp-8);
  border-radius:6px;cursor:pointer;color:var(--text-muted);font-size:11px;
  transition:color var(--dur-fast),background var(--dur-fast);user-select:none;
  margin-top:3px;border-top:1px solid var(--border-subtle);padding-top:var(--sp-6);
}
.collapsed-toggle:hover{background:var(--surface-hover);color:var(--text-secondary)}

/* ============================================================  NOTE PANEL  */
#note-panel{
  position:fixed;bottom:var(--sp-24);left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--surface-panel);border:1px solid var(--border-default);
  border-radius:12px;padding:var(--sp-16) var(--sp-24);
  max-width:400px;width:calc(100% - 48px);z-index:100;
  opacity:0;pointer-events:none;
  transition:opacity var(--dur-med) var(--ease-out),transform var(--dur-med) var(--ease-out);
  box-shadow:0 16px 48px rgba(0,0,0,.6);
}
#note-panel.visible{opacity:1;pointer-events:all;transform:translateX(-50%) translateY(0)}
#note-panel-close{
  position:absolute;top:var(--sp-8);right:var(--sp-12);background:none;border:none;
  color:var(--text-secondary);font-size:16px;cursor:pointer;padding:var(--sp-4);
}
#note-panel-types{display:flex;gap:var(--sp-6);flex-wrap:wrap;margin-bottom:var(--sp-8)}
.note-type-chip{
  font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  padding:2px 8px;border-radius:999px;color:#fff;
}
#note-panel-chars{font-size:14px;font-weight:600;margin-bottom:var(--sp-8);color:var(--text-primary)}
#note-panel-label{font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:var(--sp-6);font-style:italic}
#note-panel-text{font-size:13px;color:var(--text-secondary);line-height:1.6}

/* ============================================================  MOBILE  */
@media(max-width:700px){
  #cluster-grid{grid-template-columns:1fr;padding:var(--sp-12);gap:var(--sp-12)}
  #header-top{padding:var(--sp-12) var(--sp-16);gap:var(--sp-12)}
  #chapter-strip{padding:var(--sp-8) var(--sp-16) var(--sp-12)}
  .family-card{padding:var(--sp-12)}
  #filters{gap:4px}
  .filter-pill{padding:3px 8px;font-size:10px}
  #rel-row{padding:var(--sp-8) var(--sp-16)}
}
@media(min-width:701px) and (max-width:1100px){
  #cluster-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<div id="header">
  <div id="header-top">
    <h1>My Brilliant Friend &mdash; <span>Character Relationships</span></h1>
    <div id="filters">
      <div class="filter-pill active" data-rel="romance"><i class="fa-solid fa-heart fa-xs"></i> Romance</div>
      <div class="filter-pill active" data-rel="friendship"><i class="fa-solid fa-star fa-xs"></i> Friendship</div>
      <div class="filter-pill active" data-rel="alliance"><i class="fa-solid fa-handshake fa-xs"></i> Alliance</div>
      <div class="filter-pill active" data-rel="mentorship"><i class="fa-solid fa-graduation-cap fa-xs"></i> Mentorship</div>
      <div class="filter-pill active" data-rel="conflict"><i class="fa-solid fa-bolt fa-xs"></i> Conflict</div>
      <div class="filter-pill active" data-rel="family"><i class="fa-solid fa-house fa-xs"></i> Family</div>
    </div>
  </div>
  <div id="chapter-strip">
    <div id="chapter-strip-label">
      <span>Chapter</span>
      <span id="chapter-val">87</span>
      <span id="chapter-val-suffix">of 87 —</span>
      <span id="chapter-era">The Wedding</span>
    </div>
    <input type="range" id="chapter-slider" min="1" max="87" value="87">
    <div id="chapter-ticks">
      <span>1</span><span>10</span><span>20</span><span>30</span><span>40</span>
      <span>50</span><span>60</span><span>70</span><span>87</span>
    </div>
  </div>
  <div id="timeline-bar">
    <div id="timeline-toggle">
      <i class="fa-solid fa-chevron-down fa-xs" id="tl-chevron"></i>
      Timeline of Key Events
    </div>
    <div id="timeline-scroll"></div>
  </div>
</div>

<div id="main">
  <div id="rel-row">
    <span id="rel-row-label">Connections</span>
    <span id="rel-row-empty" style="display:none">No connections at this chapter</span>
  </div>
  <div id="cluster-grid"></div>
</div>

<div id="note-panel">
  <button id="note-panel-close"><i class="fa-solid fa-xmark"></i></button>
  <div id="note-panel-types"></div>
  <div id="note-panel-chars"></div>
  <div id="note-panel-label"></div>
  <div id="note-panel-text"></div>
</div>

<script>
/* ============================================================  DATA  */

const FAMILIES = [
  {
    id:'greco', name:'Greco Family', subtitle:"The Porter's Family",
    color:'var(--cluster-greco)',
    parents:[
      {id:'mrgreco',  name:'Mr. Greco',  role:'City hall porter'},
      {id:'mrsgreco', name:'Mrs. Greco', role:'Mother'},
    ],
    children:[
      {id:'elena',  name:'Elena "Lenù"', role:'Protagonist & narrator', protagonist:true},
      {id:'peppe',  name:'Peppe',  role:'Younger sibling'},
      {id:'gianni', name:'Gianni', role:'Younger sibling'},
      {id:'elisa',  name:'Elisa',  role:'Younger sibling'},
    ]
  },
  {
    id:'cerullo', name:'Cerullo Family', subtitle:"The Shoemaker's Family",
    color:'var(--cluster-cerullo)',
    parents:[
      {id:'fernando', name:'Fernando', role:'Shoemaker'},
      {id:'nunzia',   name:'Nunzia',   role:'Mother'},
    ],
    children:[
      {id:'rinoElder',   name:'Rino (Elder)',   role:'Older brother'},
      {id:'lila',        name:'Raffaella "Lila"', role:"Elena's best friend", protagonist:true},
      {id:'rinoYounger', name:'Rino (Younger)', role:"Raffaella's son (later)"},
    ]
  },
  {
    id:'carracci', name:'Carracci Family', subtitle:"The Don Achille / Grocer Family",
    color:'var(--cluster-carracci)',
    parents:[
      {id:'donAchille', name:'Don Achille', role:'Loan shark', died:true},
      {id:'donnaMaria', name:'Donna Maria', role:'Wife'},
    ],
    children:[
      {id:'stefano',  name:'Stefano',  role:'Eldest son, grocery owner'},
      {id:'alfonso',  name:'Alfonso',  role:'Classmate'},
      {id:'pinuccia', name:'Pinuccia', role:'Sister'},
    ]
  },
  {
    id:'peluso', name:'Peluso Family', subtitle:"The Carpenter's Family",
    color:'var(--cluster-peluso)',
    parents:[
      {id:'alfredoPeluso', name:'Alfredo',    role:'Carpenter'},
      {id:'giuseppina',    name:'Giuseppina', role:'Wife'},
    ],
    children:[
      {id:'pasquale', name:'Pasquale', role:'Construction worker'},
      {id:'carmela',  name:'Carmela',  role:'Sister (Carmen)'},
    ]
  },
  {
    id:'sarratore', name:'Sarratore Family', subtitle:"The Railroad Worker & Poet's Family",
    color:'var(--cluster-sarratore)',
    parents:[
      {id:'donato', name:'Donato', role:'Railroad worker & poet'},
      {id:'lidia',  name:'Lidia',  role:'Wife'},
    ],
    children:[
      {id:'nino',   name:'Nino',   role:'Eldest son', key:true},
      {id:'marisa', name:'Marisa', role:'Younger sister'},
      {id:'pino',   name:'Pino',   role:'Younger child'},
      {id:'clelia', name:'Clelia', role:'Younger child'},
      {id:'ciro',   name:'Ciro',   role:'Younger child'},
    ]

const ERAS = [

  {max:25,  label:'Elementary School Years'},
  {max:40,  label:'Diverging Paths'},
  {max:55,  label:'Adolescence & Awakening'},
  {max:70,  label:'Teenage Romances'},
  {max:80,  label:'Lila & the Solaras'},
  {max:87,  label:'The Wedding'},
];

const TYPE_LABELS = {
  romance:'Romance', friendship:'Friendship', alliance:'Alliance',
  mentorship:'Mentorship', conflict:'Conflict', family:'Family'
};

const TYPE_COLORS = {
  romance:'var(--rel-romance)', friendship:'var(--rel-friendship)',
  alliance:'var(--rel-alliance)', mentorship:'var(--rel-mentorship)',
  conflict:'var(--rel-conflict)', family:'var(--rel-family)'
};

const TYPE_COLORS_HEX = {
  romance:'#E8527A',friendship:'#52B788',alliance:'#4A90D9',
  mentorship:'#9B8AC4',conflict:'#8B949E',family:'#5A8FBF'
};

/* ============================================================  STATE  */
let currentChapter = 87;
let activeFilters = new Set(['romance','friendship','alliance','mentorship','conflict','family']);
let selectedCharId = null;
let timelineOpen = false;

const CHARS_WITH_RELS = new Set(RELATIONSHIPS.flatMap(r=>[r.from,r.to]));
const charColorMap = {};
FAMILIES.forEach(f=>{
  [...f.parents,...f.children].forEach(c=>{ charColorMap[c.id]=f.color; });
});

function findChar(id){
  for(const f of FAMILIES){
    const c=[...f.parents,...f.children].find(ch=>ch.id===id);
    if(c) return c;
  }
  return null;
}
function findFamily(charId){
  return FAMILIES.find(f=>[...f.parents,...f.children].some(c=>c.id===charId));
}

function visibleRelationships(){
  return RELATIONSHIPS.filter(r=>r.fromChapter<=currentChapter && activeFilters.has(r.type));
}

function currentEra(){
  return (ERAS.find(e=>currentChapter<=e.max)||ERAS[ERAS.length-1]).label;
}

function initials(name){
  return name.replace(/["'""'']/g,'').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
}

/* ============================================================  RENDER REL ROW  */
function renderRelRow(){
  const row = document.getElementById('rel-row');
  const emptyMsg = document.getElementById('rel-row-empty');

  /* remove old chips, keep label and empty message */
  [...row.querySelectorAll('.rel-conn-chip')].forEach(el=>el.remove());

  if(!selectedCharId){
    row.classList.remove('visible');
    return;
  }

  row.classList.add('visible');

  const char = findChar(selectedCharId);
  const label = document.getElementById('rel-row-label');
  label.textContent = char ? `${char.name}'s connections` : 'Connections';

  const visRels = visibleRelationships().filter(r=>r.from===selectedCharId||r.to===selectedCharId);

  if(visRels.length===0){
    emptyMsg.style.display='';
    return;
  }
  emptyMsg.style.display='none';

  /* group by other person, collect types */
  const grouped = {};
  visRels.forEach(r=>{
    const otherId = r.from===selectedCharId ? r.to : r.from;
    if(!grouped[otherId]) grouped[otherId]=[];
    grouped[otherId].push(r);
  });

  Object.entries(grouped).forEach(([otherId, rels])=>{
    const other = findChar(otherId);
    if(!other) return;
    /* one chip per relationship type with that person */
    rels.forEach(rel=>{
      if(!activeFilters.has(rel.type)) return;
      const chip = document.createElement('div');
      chip.className='rel-conn-chip';
      chip.dataset.type=rel.type;
      chip.title=rel.note||rel.label||'';
      chip.innerHTML=`<div class="chip-dot"></div><span class="chip-name">${other.name}</span><span class="chip-type">${TYPE_LABELS[rel.type]}</span>`;
      chip.addEventListener('click',()=>{
        showNote([rel], rel.from, rel.to);
      });
      row.appendChild(chip);
    });
  });
}

/* ============================================================  RENDER CARDS  */
function renderCards(){
  const grid = document.getElementById('cluster-grid');
  grid.innerHTML = '';

  const visRels = visibleRelationships();
  const connectedInfo = {};
  const connectedPairs = new Set();

  visRels.forEach(r=>{
    connectedPairs.add(r.from+'|'+r.to);
    connectedPairs.add(r.to+'|'+r.from);
    if(selectedCharId){
      const other = r.from===selectedCharId ? r.to : r.to===selectedCharId ? r.from : null;
      if(other){
        if(!connectedInfo[other]) connectedInfo[other]=new Set();
        connectedInfo[other].add(r.type);
      }
    }
  });

  FAMILIES.forEach(family=>{
    const card = document.createElement('div');
    card.className='family-card';
    card.dataset.family=family.id;

    const col = family.color;

    card.innerHTML=`
      <div class="family-card-header">
        <div class="cluster-dot" style="background:${col}"></div>
        <div>
          <h2>${family.name}</h2>
          <div class="family-subtitle">${family.subtitle}</div>
        </div>
      </div>`;

    /* parents row */
    if(family.parents.length>0){
      const pRow = document.createElement('div');
      pRow.className='family-parents';
      family.parents.forEach((p,i)=>{
        if(i>0){
          const sep=document.createElement('span');
          sep.className='parent-sep';
          sep.textContent='×';
          pRow.appendChild(sep);
        }
        const pn=document.createElement('div');
        pn.className='parent-node';
        pn.dataset.charId=p.id;
        pn.title=p.role;

        if(CHARS_WITH_RELS.has(p.id)){
          pn.style.cursor='pointer';
          pn.style.color='var(--text-primary)';
          pn.addEventListener('click',e=>{e.stopPropagation();handleCharClick(p.id);});
        }

        let fadeStyle='';
        if(selectedCharId){
          const isSelected=p.id===selectedCharId;
          const isConnected=connectedPairs.has(selectedCharId+'|'+p.id);
          if(!isSelected&&!isConnected) fadeStyle='opacity:.15;';
          else if(isSelected) pn.style.fontWeight='700';
        }
        pn.style.cssText+=fadeStyle;
        if(p.died) pn.innerHTML=p.name+'<span style="color:var(--text-muted)"> †</span>';
        else pn.textContent=p.name;

        if(selectedCharId && connectedInfo[p.id]){
          const types=[...connectedInfo[p.id]];
          const badgeEl=document.createElement('div');
          badgeEl.className='rel-badges';
          badgeEl.style.display='inline-flex';badgeEl.style.marginLeft='4px';
          types.forEach(t=>{
            const b=document.createElement('span');
            b.className='rel-badge';b.dataset.type=t;
            b.textContent=TYPE_LABELS[t];
            badgeEl.appendChild(b);
          });
          pn.appendChild(badgeEl);
        }

        pRow.appendChild(pn);
      });
      card.appendChild(pRow);

      if(family.children.length>0){
        const branch=document.createElement('div');
        branch.className='tree-branch';
        card.appendChild(branch);
      }
    }

    /* children */
    const childrenWithRels  = family.children.filter(c=>CHARS_WITH_RELS.has(c.id));
    const childrenWithout   = family.children.filter(c=>!CHARS_WITH_RELS.has(c.id));

    const list=document.createElement('div');
    list.className='children-list';

    const renderChildNode=(char)=>{
      const isSelected  = char.id===selectedCharId;
      const isConnected = selectedCharId && connectedPairs.has(selectedCharId+'|'+char.id);
      const isFaded     = selectedCharId && !isSelected && !isConnected;

      const node=document.createElement('div');
      node.className='character-node'+(isSelected?' selected':'')+(isFaded?' faded':'');
      node.dataset.charId=char.id;
      node.setAttribute('role','button');
      node.setAttribute('tabindex','0');

      const avatarClass='char-avatar'+(char.protagonist?' protagonist':'');
      const avatar=`<div class="${avatarClass}" style="background:${col}">${initials(char.name)}${char.key?'<span class="key-star">★</span>':''}</div>`;

      let badgesHtml='';
      if(isConnected && connectedInfo[char.id]){
        const types=[...connectedInfo[char.id]];
        badgesHtml=`<div class="rel-badges">${types.map(t=>`<span class="rel-badge" data-type="${t}">${TYPE_LABELS[t]}</span>`).join('')}</div>`;
      }

      node.innerHTML=`${avatar}<div style="flex:1;min-width:0"><div class="char-name">${char.name}</div><div class="char-role">${char.role}</div></div>${badgesHtml}`;
      node.addEventListener('click',()=>handleCharClick(char.id));
      node.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' ')handleCharClick(char.id);});
      list.appendChild(node);
    };

    childrenWithRels.forEach(renderChildNode);

    if(childrenWithout.length>0){
      const names=childrenWithout.map(c=>c.name).join(', ');
      const toggle=document.createElement('div');
      toggle.className='collapsed-toggle';
      toggle.dataset.expanded='false';
      toggle.innerHTML=`<i class="fa-solid fa-plus fa-xs"></i><span>+${childrenWithout.length} — ${names}</span>`;

      const minorList=document.createElement('div');
      minorList.style.display='none';
      childrenWithout.forEach(c=>{
        const row=document.createElement('div');
        row.className='character-node';
        row.style.cursor='default';
        const isFaded=selectedCharId&&!connectedPairs.has(selectedCharId+'|'+c.id)&&c.id!==selectedCharId;
        if(isFaded) row.classList.add('faded');
        row.innerHTML=`<div class="char-avatar" style="background:${col};opacity:.5">${initials(c.name)}</div><div><div class="char-name" style="color:var(--text-secondary)">${c.name}</div><div class="char-role">${c.role}</div></div>`;
        minorList.appendChild(row);
      });

      toggle.addEventListener('click',e=>{
        e.stopPropagation();
        const exp=toggle.dataset.expanded==='true';
        toggle.dataset.expanded=String(!exp);
        minorList.style.display=exp?'none':'block';
        toggle.querySelector('i').className=exp?'fa-solid fa-plus fa-xs':'fa-solid fa-minus fa-xs';
      });
      list.appendChild(toggle);
      list.appendChild(minorList);
    }

    card.appendChild(list);
    grid.appendChild(card);
  });
}

/* ============================================================  INTERACTIONS  */
function handleCharClick(charId){
  selectedCharId = selectedCharId===charId ? null : charId;
  renderCards();
  renderRelRow();
}

function showNote(rels, fromId, toId){
  const fromChar=findChar(fromId), toChar=findChar(toId);
  if(!fromChar||!toChar) return;
  const types=[...new Set(rels.map(r=>r.type))];
  document.getElementById('note-panel-types').innerHTML=types.map(t=>`<span class="note-type-chip" style="background:${TYPE_COLORS_HEX[t]}">${TYPE_LABELS[t]}</span>`).join('');
  document.getElementById('note-panel-chars').textContent=`${fromChar.name} & ${toChar.name}`;
  document.getElementById('note-panel-label').textContent=rels[0].label||'';
  document.getElementById('note-panel-text').textContent=rels.map(r=>r.note).join('\n\n');
  document.getElementById('note-panel').classList.add('visible');
}

document.getElementById('note-panel-close').addEventListener('click',()=>{
  document.getElementById('note-panel').classList.remove('visible');
});

document.getElementById('cluster-grid').addEventListener('click',e=>{
  if(!e.target.closest('.character-node')&&!e.target.closest('.parent-node')){
    selectedCharId=null; renderCards(); renderRelRow();
  }
});

/* ============================================================  FILTERS  */
document.querySelectorAll('.filter-pill').forEach(pill=>{
  pill.addEventListener('click',()=>{
    const rel=pill.dataset.rel;
    if(activeFilters.has(rel)){ activeFilters.delete(rel); pill.classList.remove('active'); }
    else{ activeFilters.add(rel); pill.classList.add('active'); }
    renderCards(); renderRelRow();
  });
});

/* ============================================================  CHAPTER SLIDER  */
const slider=document.getElementById('chapter-slider');
const chVal =document.getElementById('chapter-val');
const chEra =document.getElementById('chapter-era');

function updateSlider(){
  const pct=((slider.value-slider.min)/(slider.max-slider.min))*100;
  slider.style.setProperty('--pct',pct);
  chVal.textContent=slider.value;
  chEra.textContent=currentEra();
  renderTimeline();
}

slider.addEventListener('input',()=>{
  currentChapter=parseInt(slider.value,10);
  updateSlider(); renderCards(); renderRelRow();
});
updateSlider();

/* ============================================================  TIMELINE  */
function renderTimeline(){
  const scroll=document.getElementById('timeline-scroll');
  scroll.innerHTML='';
  TIMELINE.forEach(ev=>{
    const isFuture=ev.chapter>currentChapter;
    const isCurrent=!isFuture && (
      TIMELINE.indexOf(ev)===TIMELINE.length-1 ||
      TIMELINE[TIMELINE.indexOf(ev)+1].chapter>currentChapter
    );
    const div=document.createElement('div');
    div.className='timeline-event'+(isFuture?' future':'')+(isCurrent?' current':'');
    div.innerHTML=`
      <div class="timeline-num">
        <div class="tl-dot${isCurrent?' current-dot':''}">${ev.num}</div>
        <span class="timeline-year">${ev.year}</span>
      </div>
      <div class="timeline-title">${ev.title}</div>
      <div class="timeline-desc">${ev.desc}</div>`;
    scroll.appendChild(div);
  });
}

const tlToggle=document.getElementById('timeline-toggle');
const tlScroll=document.getElementById('timeline-scroll');
const tlChevron=document.getElementById('tl-chevron');
tlToggle.addEventListener('click',()=>{
  timelineOpen=!timelineOpen;
  tlScroll.style.display=timelineOpen?'flex':'none';
  tlChevron.className=timelineOpen?'fa-solid fa-chevron-up fa-xs':'fa-solid fa-chevron-down fa-xs';
  if(timelineOpen) renderTimeline();
});

/* ============================================================  INIT  */
renderCards();
renderRelRow();
</script>
